[Unit]
# On first boot /data is not yet a LUKS container; data-enroll.service creates and
# TPM-enrols it. Require + order it before this generated unlock so the container
# exists before systemd-cryptsetup tries to open it. On every later boot
# data-enroll is a fast no-op. See docs/plans/x86-security.md.
Requires=data-enroll.service
After=data-enroll.service
