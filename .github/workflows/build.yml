name: Build WendyOS Images

on:
  push:
    branches: [main]
    tags:
      # Release tags are plain MAJOR.MINOR.PATCH - no 'v' prefix anywhere
      # (git tags, GitHub releases, and GCS manifests all use the same string).
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
  workflow_dispatch:
    inputs:
      device:
        description: "Target device. 'all' builds every device."
        type: choice
        required: false
        default: all
        options:
          - all
          - raspberry-pi-3
          - raspberry-pi-4
          - raspberry-pi-5
          - jetson-agx-orin
          - jetson-orin-nano
          - jetson-agx-thor
      version:
        description: "Git ref (commit SHA, tag, or branch) to build. Empty = latest main."
        type: string
        required: false
        default: ""
      debug:
        description: "Enable WENDYOS_DEBUG (debug tools) on all devices. Auto-enabled on nightly builds; use this to opt in on release builds triggered by promote.yml."
        type: boolean
        required: false
        default: false
      sshd:
        description: "Enable WENDYOS_SSHD (SSH server) on all devices. Must be set explicitly — not auto-enabled on nightly builds."
        type: boolean
        required: false
        default: false

# Never let two runs for the same ref overlap: the failing nightly on
# 2026-06-04 had two main-push runs uploading and publishing the same
# version concurrently (4 writers per device manifest). PR runs cancel
# superseded builds; main/tag runs queue instead so a publish in progress
# is never killed halfway.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # detect-changes: compute the build matrix.
  # On main / workflow_dispatch we always build every device (nightly).
  # On pull_request we also always build every device: PR images back
  # `wendy os install --pr`, which needs an image for the user's target
  # regardless of which paths changed in the PR.
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect affected devices
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      devices: ${{ steps.set.outputs.devices }}
      version: ${{ steps.version.outputs.version }}
      is-release: ${{ steps.version.outputs.is-release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.version }}

      # Compute the build version exactly once so every matrix job and the
      # publish job agree on a single version string for the whole run.
      #   tag push        -> MAJOR.MINOR.PATCH (the tag itself, no 'v')
      #   main / dispatch -> nightly-YYYYMMDDTHHMMSS
      - id: version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [[ "$REF_TYPE" == "tag" ]]; then
            VERSION="${REF_NAME#v}"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "ERROR: release tag must be MAJOR.MINOR.PATCH (got: $REF_NAME)" >&2
              exit 1
            fi
            # The published version must match what the image believes it is.
            # promote.yml checks this before tagging; this guards manual tags.
            DISTRO_VERSION=$(grep 'DISTRO_VERSION' conf/distro/wendyos.conf | head -1 | sed 's/.*"\(.*\)"/\1/')
            if [[ "$VERSION" != "$DISTRO_VERSION" ]]; then
              echo "ERROR: tag $REF_NAME does not match DISTRO_VERSION=$DISTRO_VERSION in conf/distro/wendyos.conf" >&2
              exit 1
            fi
            echo "is-release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME:-}" == "pull_request" ]]; then
            VERSION="pr-${PR_NUMBER}"
            echo "is-release=false" >> "$GITHUB_OUTPUT"
          else
            VERSION="nightly-$(date -u +%Y%m%dT%H%M%S)"
            echo "is-release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Build version: $VERSION"

      - id: set
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_DEVICE: ${{ inputs.device }}
        run: |
          set -euo pipefail

          # Ordered longest-pole-first. The self-hosted builder pool cannot run
          # all matrix jobs at once, so queued jobs are picked up in this
          # (include) order as runners free up. A run's wall-clock is set by
          # whichever heavy build lands in the final scheduling wave, so the
          # slowest builds must be dispatched first: jetson-agx-thor is the long
          # pole (~14 min warm vs ~5 min for a Pi; heavier still on release
          # builds, which add tegraflash + flashpack + upload), then the other
          # Jetsons, then the Raspberry Pis. Do NOT sort this alphabetically.
          ALL_MATRIX='[
            {"device":"jetson-agx-thor","storage":"nvme"},
            {"device":"jetson-agx-orin","storage":"nvme"},
            {"device":"jetson-agx-orin","storage":"emmc"},
            {"device":"jetson-orin-nano","storage":"nvme"},
            {"device":"raspberry-pi-5","storage":"nvme"},
            {"device":"raspberry-pi-5","storage":"sd"},
            {"device":"raspberry-pi-4","storage":"sd"},
            {"device":"raspberry-pi-3","storage":"sd"}
          ]'
          # Collapse to one line so it can be written to $GITHUB_OUTPUT, which
          # requires single-line key=value pairs (no implicit multiline support).
          ALL_MATRIX=$(echo "${ALL_MATRIX}" | jq -c .)

          emit_all() {
            echo "matrix={\"include\":${ALL_MATRIX}}" >> "$GITHUB_OUTPUT"
            echo "devices=jetson-agx-thor jetson-agx-orin jetson-orin-nano raspberry-pi-5 raspberry-pi-4 raspberry-pi-3" >> "$GITHUB_OUTPUT"
          }

          emit_one() {
            local dev="$1"
            local entries
            entries=$(echo "${ALL_MATRIX}" | jq -c "[.[] | select(.device == \"${dev}\")]")
            if [[ "$(echo "${entries}" | jq 'length')" -eq 0 ]]; then
              echo "ERROR: Unknown device '${dev}'." >&2
              exit 1
            fi
            echo "matrix={\"include\":${entries}}" >> "$GITHUB_OUTPUT"
            echo "devices=${dev}"                    >> "$GITHUB_OUTPUT"
          }

          # Non-PR triggers: build everything by default. workflow_dispatch can
          # narrow to a single device via the 'device' input ('' or 'all' = all).
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            DEV="${INPUT_DEVICE:-all}"
            if [[ -z "${DEV}" || "${DEV}" == "all" ]]; then
              echo "Trigger=${EVENT_NAME} device=all: building all devices."
              emit_all
            else
              echo "Trigger=${EVENT_NAME} device=${DEV}: building one device."
              emit_one "${DEV}"
            fi
            exit 0
          fi

          # PR builds force-build every device so `wendy os install --pr` always
          # has an image for the user's target, regardless of which paths changed.
          echo "Trigger=pull_request: force-building all devices for --pr installs."
          emit_all
          exit 0

  # ---------------------------------------------------------------------------
  # build: per-device Yocto image build.
  # Runs on the self-hosted ephemeral-runner platform (wendylabsinc/ci). Each
  # job is a fresh podman container on a box with a persistent NVMe cache
  # (sstate/downloads/repos) bind-mounted at /opt/wendy-cache/wendyos-builder.
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.device }} (${{ matrix.storage }})
    needs: detect-changes
    # Never run untrusted fork-PR code on the self-hosted builder: it shares a
    # persistent, writable sstate/downloads cache across jobs, so a poisoned PR
    # build could corrupt release-image artifacts. Same-repo PRs, push, and
    # workflow_dispatch are unaffected (H1).
    if: >-
      needs.detect-changes.outputs.devices != '' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      # GitHub mints the OIDC token (not the runner), so GCP Workload Identity
      # Federation still works on the self-hosted platform.
      id-token: write
    runs-on: [self-hosted, linux, x64, wendyos-builder]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    env:
      WENDYOS_HOST_BUILD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: wendyos
          ref: ${{ inputs.version }}

      # Point the three build caches at the tenant's persistent NVMe pool.
      # common.inc pins DL_DIR/SSTATE_DIR to ${TOPDIR}/../{downloads,sstate-cache},
      # siblings of build/ in the workspace — so symlinking those onto the cache
      # makes the existing paths resolve onto NVMe with no build-logic changes.
      # Both are content-hashed and race-tolerant across the matrix. repos/ is
      # NOT race-tolerant and is handled separately (private reflink snapshot) in
      # the bootstrap step below.
      - name: Wire caches to persistent NVMe
        run: |
          set -euo pipefail
          base=/opt/wendy-cache/wendyos-builder
          for d in sstate-cache downloads; do
            ln -sfn "$base/$d" "$GITHUB_WORKSPACE/$d"
            echo "linked $GITHUB_WORKSPACE/$d -> $base/$d"
          done

      # ---------- Build ----------

      - name: Derive build variables
        id: vars
        env:
          DEVICE: ${{ matrix.device }}
          STORAGE: ${{ matrix.storage }}
        run: |
          case "$DEVICE:$STORAGE" in
            raspberry-pi-3:sd)    BOARD=rpi3-sd;               MACHINE=raspberrypi3-64-wendyos ;;
            raspberry-pi-4:sd)    BOARD=rpi4-sd;               MACHINE=raspberrypi4-64-wendyos ;;
            raspberry-pi-5:sd)    BOARD=rpi5-sd;               MACHINE=raspberrypi5-wendyos ;;
            raspberry-pi-5:nvme)  BOARD=rpi5-nvme;             MACHINE=raspberrypi5-nvme-wendyos ;;
            jetson-agx-orin:nvme) BOARD=jetson-agx-orin;       MACHINE=jetson-agx-orin-devkit-nvme-wendyos ;;
            jetson-agx-orin:emmc) BOARD=jetson-agx-orin-emmc;  MACHINE=jetson-agx-orin-devkit-emmc-wendyos ;;
            jetson-orin-nano:nvme) BOARD=jetson-orin-nano-nvme; MACHINE=jetson-orin-nano-devkit-nvme-wendyos ;;
            jetson-agx-thor:nvme) BOARD=jetson-agx-thor;       MACHINE=jetson-agx-thor-devkit-nvme-wendyos ;;
            *) echo "Unknown device/storage: $DEVICE/$STORAGE"; exit 1 ;;
          esac
          echo "board=$BOARD" >> "$GITHUB_OUTPUT"
          echo "machine=$MACHINE" >> "$GITHUB_OUTPUT"

      # Isolate repos/ per job so no two runs can rewrite one another's layer
      # tree. The matrix shares one seed on the NVMe cache and clone_repos does
      # git fetch/checkout there — unsafe under concurrency, and a cross-run
      # checkout at a different SRCREV would corrupt an in-flight build. reflink
      # (XFS reflink=1 on this pool) gives each job an instant, space-free
      # copy-on-write snapshot of the seed; the build reads only that private
      # copy. reflink can't cross filesystems, so the snapshot lives on the pool
      # and is symlinked into the workspace. WENDYOS_HOST_BUILD (job env) keeps
      # bootstrap in host-build mode (no Docker image build).
      - name: Bootstrap build environment (repos isolated via reflink)
        working-directory: ${{ github.workspace }}
        env:
          BOARD: ${{ steps.vars.outputs.board }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
          PRIV_TAG: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.device }}-${{ matrix.storage }}
        run: |
          set -euo pipefail
          # The launcher bind-mounts each declared cache subdir individually, so
          # only sstate-cache/, downloads/ and repos/ are writable — the parent
          # dir is not. Keep the seed, per-job snapshots, and the lock all inside
          # the writable repos/ mount (same XFS, so reflink still applies).
          base=/opt/wendy-cache/wendyos-builder/repos
          seed="$base/seed"
          priv="$base/runs/$PRIV_TAG"
          mkdir -p "$seed" "$base/runs"
          exec 9>"$base/.lock"
          if [[ "$IS_PR" == "true" ]]; then
            # PR: never write the shared seed. Take a read-consistent snapshot
            # under a shared lock, then advance only the private copy.
            flock -s 9
            rm -rf "$priv"
            cp -a --reflink=always "$seed" "$priv"
            flock -u 9
            ln -sfn "$priv" "$GITHUB_WORKSPACE/repos"
            ./wendyos/bootstrap.sh
          else
            # main/tag/dispatch: advance the seed to this run's SRCREVs and
            # snapshot it, both under an exclusive lock, so the seed stays warm
            # for future snapshots. bootstrap runs against the seed (symlink),
            # then we swap the symlink for the private snapshot at the same path
            # (make build re-sources oe-init from ./repos, so the swap is
            # transparent). Held only for the fast bootstrap + snapshot.
            flock -x 9
            ln -sfn "$seed" "$GITHUB_WORKSPACE/repos"
            ./wendyos/bootstrap.sh
            rm -f "$GITHUB_WORKSPACE/repos"
            rm -rf "$priv"
            cp -a --reflink=always "$seed" "$priv"
            ln -sfn "$priv" "$GITHUB_WORKSPACE/repos"
            flock -u 9
          fi
          echo "repos: private reflink snapshot at $priv"

      # Back build/tmp with the launcher's NVMe scratch mount. Two constraints
      # must hold together, and each of the two prior attempts satisfied only one:
      #
      #   1. Yocto's pseudo (fakeroot) records canonical absolute paths and does
      #      NOT tolerate TMPDIR being (or sitting behind) a symlink. Leaving
      #      TMPDIR at its default while symlinking build/tmp -> /wendy/build-tmp
      #      made rootfs-time postinstall scriptlets run under pseudo fail
      #      ("Postinstall scriptlets of ['rpcbind'] have failed" at do_rootfs)
      #      on every board and branch (self-hosted only).
      #   2. The upload/packaging steps read $GITHUB_WORKSPACE/build/tmp/deploy.
      #      A bare TMPDIR=/wendy/build-tmp override also moves DEPLOY_DIR there
      #      (Yocto default ${TMPDIR}/deploy), so images become invisible to
      #      those steps (surfaces on non-PR builds, which run them).
      #
      # A bind mount would give a real path for both, but the runner has no
      # passwordless sudo. So: set TMPDIR explicitly to a real scratch path
      # (pseudo uses the canonical dir, never a symlink) AND also symlink
      # build/tmp -> that path so the shell-level upload steps'
      # $GITHUB_WORKSPACE/build/tmp/deploy paths still resolve. Bitbake never
      # uses the symlink (TMPDIR is pinned), so pseudo stays happy.
      #
      # The /wendy scratch is bind-mounted from the box and SHARED by every job
      # container scheduled on it (exactly like the /opt/wendy-cache pool). A
      # fixed TMPDIR=/wendy/build-tmp therefore lets two concurrent jobs on the
      # same box drive bitbake against one TMPDIR — an unsupported config that
      # corrupts both builds (work/, buildstats/ and hosttools/ vanish mid-run
      # with FileNotFoundError). Give each job its own real subdirectory, keyed
      # by the same PRIV_TAG the repos snapshot uses, so the scratch is isolated
      # per job just like repos/.
      - name: Back build/tmp with the platform NVMe scratch
        env:
          PRIV_TAG: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.device }}-${{ matrix.storage }}
        run: |
          set -euo pipefail
          # Per-job real scratch path for bitbake/pseudo. Clear any stale dir a
          # prior run with the same tag might have left (tag is unique per run
          # attempt, so this only matters after a re-run of the same attempt).
          scratch="/wendy/build-tmp/$PRIV_TAG"
          rm -rf "$scratch"
          mkdir -p "$scratch"
          {
            echo ''
            echo '# wendy-ci: back TMPDIR with the platform NVMe scratch (per-job)'
            echo "TMPDIR = \"$scratch\""
          } >> "$GITHUB_WORKSPACE/build/conf/auto.conf"
          # Alias build/tmp -> the same path so upload steps that read
          # $GITHUB_WORKSPACE/build/tmp/deploy resolve to the real artifacts.
          # bootstrap created build/ but not build/tmp yet (bitbake makes it on
          # first run); clear any stray dir/symlink, then symlink onto scratch.
          rm -rf "$GITHUB_WORKSPACE/build/tmp"
          ln -sfn "$scratch" "$GITHUB_WORKSPACE/build/tmp"
          echo "TMPDIR pinned to $scratch; build/tmp aliased to it"

      - name: Stamp build provenance (version + commit)
        # Bake the build's tag/ID and the exact builder commit into the image so
        # they surface on the boot screen (/etc/issue) and in /etc/wendyos/commit.
        # VERSION is the same string the publish step uploads under
        # (pr-<N> | nightly-<ts> | X.Y.Z); COMMIT is the full builder SHA — the PR
        # head on pull_request (the reviewed commit, not the ephemeral merge SHA),
        # otherwise github.sha. Runs on every build. See WENDYOS_BUILD_* in
        # conf/template/include/local/common.inc.
        env:
          BUILD_VERSION: ${{ needs.detect-changes.outputs.version }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME:-}" == "pull_request" ]]; then
            BUILD_COMMIT="$PR_HEAD_SHA"
          else
            BUILD_COMMIT="$PUSH_SHA"
          fi
          {
            echo ''
            echo '# CI: build provenance stamped into the image'
            echo "WENDYOS_BUILD_VERSION = \"${BUILD_VERSION}\""
            echo "WENDYOS_BUILD_COMMIT = \"${BUILD_COMMIT}\""
          } >> "$GITHUB_WORKSPACE/build/conf/auto.conf"
          echo "Stamped version=${BUILD_VERSION} commit=${BUILD_COMMIT}"

      - name: Enable debug for nightly builds
        # Release images are production builds — no debug tools by default.
        # Nightly and workflow_dispatch builds get debug tooling so CI-flashed
        # devices include diagnostic utilities out of the box. Release builds
        # triggered by promote.yml can opt in via inputs.debug.
        if: (needs.detect-changes.outputs.is-release != 'true' && github.event_name != 'pull_request') || inputs.debug == true
        run: |
          {
            echo ''
            echo '# Nightly CI: enable debug tooling on all devices'
            echo 'WENDYOS_DEBUG = "1"'
          } >> "$GITHUB_WORKSPACE/build/conf/auto.conf"

      - name: Enable developer profile (PR builds)
        # PR images are open-book debug builds: full debug tooling, SSH, UART
        # console, and a local passwordless login so the PR is debuggable on
        # real hardware. Never applied to nightly (in-between) or release
        # (fortress) builds. See WENDYOS_DEV_LOGIN in wendyos-image.bb.
        if: github.event_name == 'pull_request'
        run: |
          {
            echo ''
            echo '# PR CI: open-book developer profile'
            echo 'WENDYOS_DEBUG = "1"'
            echo 'WENDYOS_SSHD = "1"'
            echo 'WENDYOS_DEBUG_UART = "1"'
            echo 'WENDYOS_DEV_LOGIN = "1"'
          } >> "$GITHUB_WORKSPACE/build/conf/auto.conf"

      - name: Enable SBOM generation for release builds
        # SPDX SBOM generation (create-spdx) is expensive — a do_create_spdx
        # task per recipe plus rootfs-time image/runtime SPDX. It is only ever
        # consumed on release builds (attached to the GitHub release by the
        # publish job). promote.yml rebuilds from scratch at the release tag
        # rather than reusing nightly artifacts, so a nightly's SBOM can never
        # feed a release — nightly and PR builds skip it entirely. The distro
        # gates `INHERIT += "create-spdx"` on WENDYOS_SBOM, set here.
        if: needs.detect-changes.outputs.is-release == 'true'
        run: |
          {
            echo ''
            echo '# Release build: generate SPDX SBOM (attached to the GitHub release)'
            echo 'WENDYOS_SBOM = "1"'
          } >> "$GITHUB_WORKSPACE/build/conf/auto.conf"

      - name: Enable SSH when explicitly requested
        # SSH is disabled by default (WENDYOS_SSHD ??= "0" in common.inc).
        # Pass inputs.sshd = true on workflow_dispatch or promote.yml to opt in.
        if: inputs.sshd == true
        run: |
          {
            echo ''
            echo '# CI: enable SSH server on all devices (explicitly requested)'
            echo 'WENDYOS_SSHD = "1"'
          } >> "$GITHUB_WORKSPACE/build/conf/auto.conf"

      # Note: SSTATE_DIR / DL_DIR are pinned to ${TOPDIR}/../{sstate-cache,downloads}
      # by conf/template/include/local/common.inc, which resolve onto the NVMe
      # cache via the symlinks wired above — no auto.conf override needed.

      # Resolve the latest *stable* wendyos-agent release (tag + asset sha256)
      # and export them so the wendyos-agent recipe pins this exact version.
      # This is what makes "ship the latest agent on every run" actually work:
      # the recipe embeds the version + checksum in SRC_URI, so a new release
      # changes the do_fetch signature and sstate re-fetches instead of reusing
      # a stale cached binary. Authenticated to avoid the 60/hr anon API limit.
      - name: Resolve latest wendyos-agent version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_json="$(curl -sSfL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/wendylabsinc/WendyOS/releases/latest")"

          version="$(jq -r '.tag_name' <<<"$release_json")"
          sha="$(jq -r '.assets[]
            | select(.name | test("^wendy-agent-linux-arm64-.*\\.tar\\.gz$"))
            | .digest' <<<"$release_json" | sed 's/^sha256://')"

          if [[ -z "$version" || "$version" == "null" || -z "$sha" || "$sha" == "null" ]]; then
            echo "Failed to resolve wendyos-agent version/sha (version='$version' sha='$sha')" >&2
            exit 1
          fi

          echo "Resolved wendyos-agent $version (sha256=$sha)"
          {
            echo "WENDYOS_AGENT_VERSION=$version"
            echo "WENDYOS_AGENT_SHA256=$sha"
          } >> "$GITHUB_ENV"

      - name: Build image
        working-directory: ${{ github.workspace }}/wendyos
        env:
          MACHINE: ${{ steps.vars.outputs.machine }}
        run: |
          set -euo pipefail
          # Tegra builds on the shared NVMe cache intermittently fail their
          # first (colder) attempt — transient do_fetch and sstate/recipe-sysroot
          # population glitches — and pass on retry (validated: both Orin and
          # Thor needed one). The retry is cheap: sstate and downloads persist,
          # so the second pass reuses everything the first produced.
          make build MACHINE="$MACHINE" || {
            echo "::warning::make build failed on first attempt; retrying once"
            make build MACHINE="$MACHINE"
          }

      # The persistent NVMe cache is written in place by the build (sstate,
      # downloads, repos are symlinked onto it) — no upload/save step needed.

      # --- Upload image and update device manifest (master manifest is handled by the publish job) ---

      # Rootfs sizes are pinned per platform (8 GiB RPi / 12 GiB Jetson,
      # conf/distro/include/wendyos-rootfs-size.inc): the deployed ext4 and the
      # .wendy OTA payload must be EXACTLY that size on every build, so nightly
      # and release artifacts are byte-identical in size and an OTA image can
      # never outgrow the on-device A/B slot. Belt-and-braces on top of the
      # bitbake floor==ceiling pin and the image_types_wendy pack-time assert;
      # runs on PRs too so drift fails fast. No sudo: in host-build mode the
      # deploy tree is runner-owned (see the SBOM staging step below).
      - name: Verify pinned rootfs size
        env:
          DEPLOY_DIR: ${{ github.workspace }}/build/tmp/deploy/images/${{ steps.vars.outputs.machine }}
          DEVICE: ${{ matrix.device }}
        run: |
          set -euo pipefail
          EXPECTED_KB=12582912  # 12 GiB, Jetson
          case "$DEVICE" in
            raspberry-pi-*) EXPECTED_KB=8388608 ;;  # 8 GiB, RPi
          esac
          EXPECTED=$((EXPECTED_KB * 1024))

          EXT4=$(find "$DEPLOY_DIR" -maxdepth 1 -name 'wendyos-image-*.ext4' ! -type l -print -quit)
          [[ -n "$EXT4" ]] || { echo "::error::no deployed wendyos-image ext4 found in $DEPLOY_DIR"; exit 1; }
          ACTUAL=$(stat -Lc %s "$EXT4")
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "::error::rootfs ext4 $EXT4 is $ACTUAL bytes; the pinned size for $DEVICE is $EXPECTED"
            exit 1
          fi

          WENDY=$(find "$DEPLOY_DIR" -maxdepth 1 -name 'wendyos-image-*.wendy' ! -type l -print -quit)
          [[ -n "$WENDY" ]] || { echo "::error::no .wendy OTA artifact found in $DEPLOY_DIR"; exit 1; }
          PAYLOAD=$(tar -xOf "$WENDY" manifest.json | python3 -c 'import json,sys; print(json.load(sys.stdin)["payload"]["size"])')
          if [[ "$PAYLOAD" != "$EXPECTED" ]]; then
            echo "::error::.wendy payload.size is $PAYLOAD bytes; the pinned size for $DEVICE is $EXPECTED"
            exit 1
          fi
          echo "rootfs size OK: ext4 and .wendy payload are exactly $EXPECTED bytes ($((EXPECTED_KB / 1048576)) GiB)"

      # SBOMs are generated by the create-spdx class (enabled in
      # conf/distro/wendyos.conf) as a byproduct of every image build, so they
      # exist on PRs too. Stage them into a flat dir for the artifact upload
      # (and, on non-PR builds, for the publisher --sbom flag below). No sudo:
      # the self-hosted runner has no passwordless sudo, and in host-build mode
      # the deploy tree is runner-owned. -L dereferences the versioned symlinks.
      - name: Stage SPDX SBOM artifacts
        id: sbom
        env:
          DEPLOY_DIR: ${{ github.workspace }}/build/tmp/deploy/images/${{ steps.vars.outputs.machine }}
        run: |
          set -euo pipefail
          STAGE="$GITHUB_WORKSPACE/sbom"
          mkdir -p "$STAGE"
          found=0
          # '*.spdx.json' also matches the '*.spdx.index.json' index, so the
          # bundle + both JSON documents are captured by these two patterns.
          for pat in '*.spdx.tar.zst' '*.spdx.json'; do
            while IFS= read -r -d '' f; do
              cp -Lf "$f" "$STAGE/"
              found=1
            done < <(find "$DEPLOY_DIR" -maxdepth 1 -name "$pat" -print0 2>/dev/null || true)
          done
          if [[ "$found" -eq 1 ]]; then
            echo "Staged SBOM files:"; ls -la "$STAGE"
            # The .spdx.tar.zst bundle is the canonical, self-contained SBOM
            # deliverable recorded in the manifest; the index JSON rides along.
            BUNDLE=$(find "$STAGE" -maxdepth 1 -name '*.spdx.tar.zst' -print -quit || true)
            echo "bundle=$BUNDLE" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No SPDX SBOM artifacts found in $DEPLOY_DIR"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SBOM artifact
        if: steps.sbom.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.device }}-${{ matrix.storage }}
          path: sbom/
          if-no-files-found: error
          retention-days: 14
          # v4 artifacts are immutable per name; overwrite lets a re-run of a
          # failed build replace the artifact from the earlier attempt.
          overwrite: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: wendyos/tools/publisher/go.mod
          cache-dependency-path: wendyos/tools/publisher/go.sum

      # Jetson flash-packaging deps are baked into the self-hosted runner image
      # — see wendylabsinc/ci. The runner has no passwordless sudo, so there is
      # no apt-get step here. Thor needs device-tree-compiler,
      # android-sdk-libsparse-utils (simg2img) and i386 runtime libs for the
      # NVIDIA flash tools; the T234 Orin flashpacks additionally need
      # build-essential (cpp preprocesses BCT dts), e2fsprogs (prebuilds
      # flashpkg.ext4), python3-yaml, openssl and zstd. All must be present in
      # the runner image.

      - name: Generate flashable image (Jetson)
        if: startsWith(matrix.device, 'jetson-')
        env:
          DEPLOY_DIR: ${{ github.workspace }}/build/tmp/deploy/images/${{ steps.vars.outputs.machine }}
          MACHINE: ${{ steps.vars.outputs.machine }}
          STORAGE: ${{ matrix.storage }}
          DEVICE: ${{ matrix.device }}
        run: |
          set -euo pipefail
          # Resolve all artifact paths + expectations from the checked-in device
          # map (.github/device-artifacts.json) via the single resolver. This
          # replaces the inline glob + per-device if/elif that drifted ~11 times.
          # The resolver fails loudly (with df/ls diagnostics) if the tegraflash
          # bundle is missing for a tegraflash-bundle device; for generated-nvme
          # devices it resolves the bundle path and the MACHINE-scoped target
          # .img path without requiring the .img to exist yet (we make it below).
          RESOLVED=$(DEVICE="$DEVICE" STORAGE="$STORAGE" MACHINE="$MACHINE" \
                     DEPLOY_DIR="$DEPLOY_DIR" \
                     "$GITHUB_WORKSPACE/wendyos/scripts/resolve-artifacts.sh")
          eval "$RESOLVED"

          # Per-MACHINE, freshly wiped staging dir. A fixed shared path
          # ($GITHUB_WORKSPACE/flash-work) on persistent snapshot runners with no
          # cleanup let one Jetson's extracted tegraflash-tar leak into the next
          # build, so an AGX image could be assembled and shipped under the Orin
          # Nano key. Scope by MACHINE and wipe so every build starts clean.
          FLASH_WORKDIR="$GITHUB_WORKSPACE/flash-work/${MACHINE}"
          rm -rf "$FLASH_WORKDIR"
          mkdir -p "$FLASH_WORKDIR"

          # All Jetsons run the wendy/blacksail OTA stack (WENDYOS_OTA=wendy):
          # IMAGE_FSTYPES emits a single 'tegraflash-tar' bundle that does NOT
          # ship the doexternal.sh / dosdcard.sh helper scripts.
          # make-thor-nvme-img.py reimplements their offline GPT image creation
          # by parsing external-flash.xml.in and writing each partition's binary
          # at the correct sector offset. The resulting wendyos-nvme.img is the
          # primary artifact for `wendy os install` (dd-based provisioning);
          # the tegraflash-tar bundle remains the recovery-flash artifact.
          #
          # The bundle must exist to extract it. The resolver already hard-fails
          # for tegraflash-bundle devices; this guards the generated-nvme case
          # (bundle is recovery-only there, so the resolver leaves it empty
          # rather than failing) to preserve the historical extract-time error.
          [[ -n "$TEGRAFLASH_BUNDLE" ]] || {
            echo "::error::no tegraflash-tar bundle for ${MACHINE} in ${DEPLOY_DIR}"
            exit 1
          }
          echo "Extracting tegraflash bundle: $TEGRAFLASH_BUNDLE"
          tar -xf "$TEGRAFLASH_BUNDLE" -C "$FLASH_WORKDIR"

          # external-flash.xml.in describes the external NVMe boot/root device.
          # eMMC builds are internal-only and ship no such layout; the SD-card
          # Orin Nano is not a CI target (its layout lives in a <device
          # type="sdcard"> block, not external-flash.xml.in, and the blacksail
          # bundle no longer ships dosdcard.sh to build it). For those the
          # tegraflash-tar bundle itself is the flash artifact (image_kind=
          # tegraflash-bundle) — nothing to generate. IMAGE_FILE for the
          # generated-nvme case is the MACHINE-scoped deploy path (never a fixed
          # workspace path), so the upload step can never pick up another
          # Jetson's image. Remove any prior copy first.
          if [[ "$IMAGE_KIND" == "generated-nvme-img" ]]; then
            NVME_IMG="$IMAGE_FILE"
            rm -f "$NVME_IMG"
            if [[ -f "$FLASH_WORKDIR/external-flash.xml.in" ]]; then
              python3 "$GITHUB_WORKSPACE/wendyos/scripts/make-thor-nvme-img.py" \
                "$FLASH_WORKDIR" "$NVME_IMG"
            else
              echo "No external-flash.xml.in in bundle for $DEVICE (storage=$STORAGE); cannot build offline NVMe image."
            fi
          else
            echo "No offline NVMe image for $DEVICE (storage=$STORAGE); the tegraflash-tar is the flash artifact."
          fi

          # Diagnose the AGX-Orin-only failure where a deploy-dir artifact that
          # exists during this step is gone by the upload step: the offline
          # .img (nvme) and the tegraflash bundle (emmc) both vanished from the
          # shared /wendy scratch on the 64 GiB AGX Orin builds, while the
          # smaller orin-nano build survived — the signature of scratch
          # exhaustion, not a naming bug. build/tmp is a symlink onto the
          # SHARED /wendy mount, so record disk + dir state here (and verify the
          # image we just wrote is actually still present) instead of surfacing
          # a bare "not produced" three steps later with no context.
          echo "== post-generate scratch state for ${MACHINE} =="
          df -h "$DEPLOY_DIR" 2>/dev/null || true
          ls -la "$DEPLOY_DIR" 2>/dev/null || true
          if [[ "$IMAGE_KIND" == "generated-nvme-img" ]]; then
            [[ -s "$IMAGE_FILE" ]] || {
              echo "::error::offline NVMe image $IMAGE_FILE missing/empty immediately after generation (see df/ls above — suspect /wendy scratch exhaustion)"
              exit 1
            }
          fi

      - name: Build flashpack (Jetson)
        # Pack the extracted tegraflash-tar into the single .tar.zst the wendy CLI
        # flashes (see make-thor-flashpack.sh for T264, make-t234-flashpack.sh for
        # the Orin family). The flash tools' dependencies (i386 libs for Thor's
        # NVIDIA tools, build-essential/e2fsprogs for T234) are baked into the
        # self-hosted runner image (wendylabsinc/ci); no apt-get here.
        if: github.event_name != 'pull_request' && contains(fromJSON('["jetson-agx-thor", "jetson-agx-orin", "jetson-orin-nano"]'), matrix.device)
        env:
          UPLOAD_VERSION: ${{ needs.detect-changes.outputs.version }}
          MACHINE: ${{ steps.vars.outputs.machine }}
          DEVICE: ${{ matrix.device }}
          STORAGE: ${{ matrix.storage }}
        run: |
          set -euo pipefail
          FLASH_WORKDIR="$GITHUB_WORKSPACE/flash-work/${MACHINE}"   # MACHINE-scoped, matches the generate step
          FLASHPACK_OUT="$GITHUB_WORKSPACE/flashpack-out"
          if [[ "$DEVICE" == "jetson-agx-thor" ]]; then
            "$GITHUB_WORKSPACE/wendyos/scripts/make-thor-flashpack.sh" \
              --bundle-dir "$FLASH_WORKDIR" \
              --out "$FLASHPACK_OUT" \
              --version "$UPLOAD_VERSION"
          else
            "$GITHUB_WORKSPACE/wendyos/scripts/make-t234-flashpack.sh" \
              --bundle-dir "$FLASH_WORKDIR" \
              --out "$FLASHPACK_OUT" \
              --version "$UPLOAD_VERSION" \
              --device "$DEVICE" \
              --storage "$STORAGE"
          fi
          # Discover rather than reconstruct the artifact name; exactly one
          # flashpack must exist or this build is wrong.
          mapfile -t FLASHPACKS < <(find "$FLASHPACK_OUT" -maxdepth 1 -name '*.flashpack.tar.zst')
          if [[ ${#FLASHPACKS[@]} -ne 1 ]]; then
            echo "::error::expected exactly 1 flashpack in $FLASHPACK_OUT, found ${#FLASHPACKS[@]}" >&2
            exit 1
          fi
          echo "FLASHPACK_FILE=${FLASHPACKS[0]}" >> "$GITHUB_ENV"

      - name: Upload image and emit manifest entry
        env:
          DEPLOY_DIR: ${{ github.workspace }}/build/tmp/deploy/images/${{ steps.vars.outputs.machine }}
          MACHINE: ${{ steps.vars.outputs.machine }}
          DEVICE: ${{ matrix.device }}
          STORAGE: ${{ matrix.storage }}
          IS_RELEASE: ${{ needs.detect-changes.outputs.is-release }}
          UPLOAD_VERSION: ${{ needs.detect-changes.outputs.version }}
          SBOM_FILE: ${{ steps.sbom.outputs.bundle }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          TOKEN=$(gcloud auth print-access-token)

          # Resolve every artifact path + expectation from the checked-in device
          # map (.github/device-artifacts.json) via the single resolver — the
          # same source of truth the generate step used. This replaces the inline
          # glob + per-device if/elif chain that drifted ~11 times. The resolver
          # fails loudly (with df/ls diagnostics) when the tegraflash bundle is
          # missing for a tegraflash-bundle device (eMMC / Thor NVMe). It emits:
          #   IMAGE_KIND IMAGE_FILE TEGRAFLASH_BUNDLE RECOVERY_EXPECTED
          #   BMAP_REQUIRED FLASHPACK_REQUIRED PASS_STORAGE RPI_NEEDS_GZIP
          RESOLVED=$(DEVICE="$DEVICE" STORAGE="$STORAGE" MACHINE="$MACHINE" \
                     DEPLOY_DIR="$DEPLOY_DIR" \
                     "$GITHUB_WORKSPACE/wendyos/scripts/resolve-artifacts.sh") || exit 1
          eval "$RESOLVED"

          # Do the non-resolution work (bmaptool / gzip) the map says applies.
          BMAP_FILE=""
          case "$IMAGE_KIND" in
            generated-nvme-img)
              # MACHINE-scoped image written by the generate step (never a fixed
              # shared path). The resolver cannot check it — it is produced after
              # Yocto deploy — so keep the stale-image guard and its df/ls
              # diagnostics here (a separate gated spec removes them later): fail
              # hard rather than upload a possibly-stale image from another build.
              if [[ ! -f "$IMAGE_FILE" ]]; then
                echo "::error::NVMe image not produced this run for ${DEVICE} (${MACHINE}): ${IMAGE_FILE} missing. Refusing to upload a possibly-stale image." >&2
                df -h "$DEPLOY_DIR" 2>/dev/null || true
                ls -la "$DEPLOY_DIR" 2>/dev/null || true
                exit 1
              fi
              bmaptool create "$IMAGE_FILE" > "${IMAGE_FILE}.bmap"
              BMAP_FILE="${IMAGE_FILE}.bmap"
              ;;
            tegraflash-bundle)
              # No offline disk image for eMMC / Thor NVMe; IMAGE_FILE is the
              # tegraflash bundle itself, already resolved and existence-checked
              # (with df/ls diagnostics) by the resolver. No bmap for this kind.
              : ;;
            sdimg-gz-with-wic-fallback)
              # RPi: IMAGE_FILE is the readlink-resolved raw image (.sdimg real
              # target, or .rootfs.wic). Generate bmap before gzip — bmaptool
              # operates on the raw image. For sdimg, gzip -f the raw file
              # (suppresses the Yocto hard-link "has N other links" error) and
              # point IMAGE_FILE at the .gz; wic uploads uncompressed.
              bmaptool create "$IMAGE_FILE" > "${IMAGE_FILE}.bmap"
              BMAP_FILE="${IMAGE_FILE}.bmap"
              if [[ "$RPI_NEEDS_GZIP" == "true" ]]; then
                gzip -f "$IMAGE_FILE"
                IMAGE_FILE="${IMAGE_FILE}.gz"
              fi
              ;;
          esac

          # Upload-only: files are pushed to GCS here, but ALL manifest writes
          # are deferred to the single serialised publish job. Parallel matrix
          # entries must never read-modify-write shared manifests (412 races,
          # lost updates). The entry JSON below is the handoff.
          ENTRY_FILE="$GITHUB_WORKSPACE/manifest-entry-${DEVICE}-${STORAGE}.json"
          ARGS=(
            --device "$DEVICE"
            --version "$UPLOAD_VERSION"
            --file "$IMAGE_FILE"
            --access-token "$TOKEN"
            --upload-only
            --metadata-out "$ENTRY_FILE"
          )

          if [[ "$IS_RELEASE" != "true" ]]; then
            ARGS+=(--nightly)
          fi

          # PR builds upload to the pr/<N>/ subtree instead of the shared
          # nightly/release tree (see wendy os install --pr).
          if [[ "${GITHUB_EVENT_NAME:-}" == "pull_request" ]]; then
            ARGS+=(--pr "${PR_NUMBER}")
          fi

          # For all Jetson targets, include the tegraflash bundle as the recovery file
          # (used for USB recovery-mode flashing via tegraflash.py / initrd-flash).
          # wendy/blacksail builds use .tegraflash-tar (JP7/r38.4.x renamed the
          # type from the older .tegraflash.tar.gz) — resolved above.
          if [[ -n "$TEGRAFLASH_BUNDLE" ]]; then
            ARGS+=(--recovery-file "$TEGRAFLASH_BUNDLE")
          fi

          # Attach the flashpack built in the previous step so the publisher
          # uploads it and records the flashpack fields in the manifest —
          # storage-scoped (nvme_flashpack_* / emmc_flashpack_*) when --storage
          # is passed, top-level otherwise (Thor). FLASHPACK_REQUIRED (from the
          # device map) is the single source of truth for which builds carry a
          # flashpack; it is true only on non-PR builds where the previous step
          # set FLASHPACK_FILE, so gating on FLASHPACK_FILE being set keeps PR
          # builds (which skip the build-flashpack step) clean. Set-but-missing
          # is a build bug; fail rather than silently publish without a flashpack.
          if [[ "$FLASHPACK_REQUIRED" == "true" && -n "${FLASHPACK_FILE:-}" ]]; then
            if [[ ! -f "$FLASHPACK_FILE" ]]; then
              echo "::error::FLASHPACK_FILE set but missing: $FLASHPACK_FILE" >&2
              exit 1
            fi
            ARGS+=(--flashpack-file "$FLASHPACK_FILE")
          fi

          # Devices with multiple storage variants pass --storage so the manifest
          # records the correct per-storage-type paths (PASS_STORAGE from the map).
          if [[ "$PASS_STORAGE" == "true" ]]; then
            ARGS+=(--storage "$STORAGE")
          fi

          # Include bmap if one was generated for this image type.
          if [[ -n "$BMAP_FILE" ]]; then
            ARGS+=(--bmap-file "$BMAP_FILE")
          fi

          # Include the OTA update artifact if the build produced one. Boards
          # run the wendyos-update stack (.wendy), gated by WENDYOS_OTA, feeding
          # the --ota-update slot / ota_update_path; the device's OTA client
          # interprets the artifact. The extension is not recompressed by the
          # publisher (only .img/.wic/.sdimg are), so it uploads as-is.
          OTA_FILE=$(find "$DEPLOY_DIR" -maxdepth 1 \
            -name "wendyos-image-${MACHINE}*.wendy" \
            -print -quit 2>/dev/null || true)
          if [[ -n "$OTA_FILE" ]]; then
            ARGS+=(--ota-update "$OTA_FILE")
          fi

          # Attach the SPDX SBOM bundle staged above. The publisher uploads it
          # to GCS alongside the image (as-is: .zst is not recompressed) and
          # records sbom_path/checksum/size in the manifest entry.
          if [[ -n "${SBOM_FILE:-}" && -f "${SBOM_FILE:-}" ]]; then
            ARGS+=(--sbom "$SBOM_FILE")
          fi

          cd "$GITHUB_WORKSPACE/wendyos/tools/publisher"
          # No retry loop: uploads go to unique per-version paths (no shared
          # state to race on) and the publisher's storage client already
          # retries transient errors internally.
          go run . "${ARGS[@]}"

      - name: Upload manifest entry artifact
        # Runs on PRs too: publish-pr (a separate job) consumes these
        # PR-stamped manifest-entry artifacts to write pr/<N>/ manifests.
        uses: actions/upload-artifact@v4
        with:
          name: manifest-entry-${{ matrix.device }}-${{ matrix.storage }}
          path: manifest-entry-${{ matrix.device }}-${{ matrix.storage }}.json
          if-no-files-found: error
          retention-days: 7
          # v4 artifacts are immutable per name; without this, re-running a
          # failed build job 409s on the artifact left by the earlier attempt.
          overwrite: true

      # Remove this job's private repos snapshot from the persistent pool. The
      # ephemeral workspace is discarded automatically, but the reflink copy
      # lives on the cache pool, so it must be cleaned up explicitly (CoW means
      # only the blocks that diverged from the seed are freed).
      - name: Release private repos snapshot
        if: always()
        env:
          PRIV_TAG: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.device }}-${{ matrix.storage }}
        run: rm -rf "/opt/wendy-cache/wendyos-builder/repos/runs/$PRIV_TAG"

      # Remove this job's private TMPDIR from the shared /wendy scratch. Unlike
      # sstate/downloads (persistent caches), TMPDIR is disposable per-build
      # working state, and the scratch is shared across job containers on the
      # box, so leaving it behind would accumulate and eventually fill the pool.
      - name: Release platform scratch
        if: always()
        env:
          PRIV_TAG: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.device }}-${{ matrix.storage }}
        run: rm -rf "/wendy/build-tmp/$PRIV_TAG"

  # ---------------------------------------------------------------------------
  # publish: the ONLY writer of GCS manifests. Build jobs upload files and
  # hand over manifest-entry artifacts; this job applies them one at a time,
  # so device and master manifests never see concurrent read-modify-writes
  # from CI. Runs for nightly (main/dispatch) and release (tag) builds.
  # !cancelled(): publish whatever subset of devices built successfully.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish manifests
    needs: [detect-changes, build]
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    concurrency:
      group: update-master-manifest
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    # Light job (manifest writes + release tagging, no Yocto): stays on a
    # GitHub-hosted runner for now. Moving it self-hosted needs broader CI work
    # first — the platform is one-tenant-per-repo today, so it would otherwise
    # ride the heavy builder tenant (64Gi reserve, a build concurrency slot) and
    # need gh baked into that image. Revisit once a right-sized publish slice exists.
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: wendyos
          ref: ${{ inputs.version }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: wendyos/tools/publisher/go.mod
          cache-dependency-path: wendyos/tools/publisher/go.sum

      - name: Download manifest entries
        uses: actions/download-artifact@v4
        with:
          pattern: manifest-entry-*
          path: manifest-entries
          merge-multiple: true

      # SBOMs from every build job, flattened into one dir. Per-machine SBOM
      # filenames are distinct across devices; storage variants of one device
      # share a machine (hence an identical SBOM), so merge-multiple's
      # last-writer-wins is harmless. Attached to the GitHub release below.
      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          path: sbom-assets
          merge-multiple: true

      - name: Write device manifests
        id: apply
        run: |
          set -euo pipefail
          shopt -s nullglob
          entries=("$GITHUB_WORKSPACE"/manifest-entries/*.json)
          if [[ ${#entries[@]} -eq 0 ]]; then
            echo "::warning::No manifest entries found (did every build fail?); nothing to publish."
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "published=true" >> "$GITHUB_OUTPUT"
          TOKEN=$(gcloud auth print-access-token)
          cd "$GITHUB_WORKSPACE/wendyos/tools/publisher"
          # Build once; up to 15 invocations follow across this step and the
          # master manifest step ($RUNNER_TEMP persists between steps).
          go build -o "$RUNNER_TEMP/publisher" .
          # Applied strictly one at a time: this job is the only manifest
          # writer, so there is nothing to race against and no retry loop.
          for entry in "${entries[@]}"; do
            echo "::group::apply $(basename "$entry")"
            cat "$entry"
            "$RUNNER_TEMP/publisher" --apply-metadata "$entry" --access-token "$TOKEN"
            echo "::endgroup::"
          done

      - name: Update master manifest
        run: |
          set -euo pipefail
          shopt -s nullglob
          entries=("$GITHUB_WORKSPACE"/manifest-entries/*.json)
          if [[ ${#entries[@]} -eq 0 ]]; then
            echo "No manifest entries; skipping master manifest update."
            exit 0
          fi
          TOKEN=$(gcloud auth print-access-token)
          cd "$GITHUB_WORKSPACE/wendyos/tools/publisher"
          # Reuse the binary from the previous step; rebuild only if missing
          # (e.g. this step re-run in isolation).
          [[ -x "$RUNNER_TEMP/publisher" ]] || go build -o "$RUNNER_TEMP/publisher" .
          # One master-manifest write per device that actually published
          # (storage variants of a device share one device manifest, hence
          # unique_by). Devices whose builds failed keep their previous
          # latest pointers instead of being bumped to a version they
          # never produced.
          readarray -t rows < <(jq -sc '[.[] | {device, version, nightly}] | unique_by(.device) | .[]' "${entries[@]}")
          for row in "${rows[@]}"; do
            DEVICE=$(jq -r .device <<<"$row")
            VERSION=$(jq -r .version <<<"$row")
            NIGHTLY=$(jq -r .nightly <<<"$row")
            ARGS=(
              --device "$DEVICE"
              --version "$VERSION"
              --master-manifest-only
              --access-token "$TOKEN"
            )
            if [[ "$NIGHTLY" == "true" ]]; then
              ARGS+=(--nightly)
            fi
            "$RUNNER_TEMP/publisher" "${ARGS[@]}" </dev/null
          done

      - name: Tag nightly pre-release on GitHub
        # Nightly builds only: release tags already exist (created by promote.yml).
        # Skipped when zero entries were published (every build failed) - never
        # tag and announce a nightly that has no images behind it.
        if: ${{ success() && github.ref_type != 'tag' && steps.apply.outputs.published == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.detect-changes.outputs.version }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/wendyos"

          # -f/--force for idempotency: a re-run of this job re-tags the same
          # commit with the same nightly-<timestamp> version.
          git tag -f "$VERSION"
          git push origin "$VERSION" --force

          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $VERSION already exists (job re-run), skipping create."
          else
            gh release create "$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --title "WendyOS $VERSION" \
              --generate-notes \
              --prerelease
          fi

          # Keep the releases page tidy: retain the 7 most recent nightly
          # pre-releases. Git tags are kept forever for traceability and
          # promotion; nightly-YYYYMMDDTHHMMSS sorts chronologically.
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease and (.tagName | startswith("nightly-"))) | .tagName] | sort | reverse | .[7:][]' |
            while read -r old; do
              echo "Pruning old nightly pre-release $old (tag kept)"
              gh release delete "$old" --yes --repo "$GITHUB_REPOSITORY"
            done

      - name: Attach SBOMs to GitHub release
        # Both nightly and release (tag) builds: for nightly the release was
        # just created above; for tags it already exists (from promote.yml).
        # Skipped when nothing published (every build failed).
        if: ${{ success() && steps.apply.outputs.published == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.detect-changes.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=("$GITHUB_WORKSPACE"/sbom-assets/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "::warning::No SBOM assets downloaded; nothing to attach to release $VERSION."
            exit 0
          fi
          # --clobber makes re-runs idempotent (replaces same-named assets).
          gh release upload "$VERSION" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" --clobber

      - name: Send Discord announcement
        # Nightly builds only: release announcements are sent by promote.yml.
        if: ${{ success() && github.ref_type != 'tag' && steps.apply.outputs.published == 'true' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_NIGHTLY_WEBHOOK_URL }}
          VERSION: ${{ needs.detect-changes.outputs.version }}
        run: |
          [[ -z "${DISCORD_WEBHOOK_URL}" ]] && exit 0
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${VERSION}"
          jq -n --arg msg "**WendyOS ${VERSION}** is out! Full changelog and downloads: ${RELEASE_URL}" '{content: $msg}' | \
            curl -fsS -o /dev/null \
              -H "Content-Type: application/json" \
              -d @- \
              "$DISCORD_WEBHOOK_URL"

  # ---------------------------------------------------------------------------
  # publish-pr: PR-only counterpart to `publish`. Writes into the pr/<N>/
  # manifest namespace instead of the top-level one, so `wendy os install --pr`
  # can resolve a PR's images without touching the real device manifests.
  # No release tagging / Discord announcement here - that stays exclusive to
  # the `publish` job's nightly/release path.
  # ---------------------------------------------------------------------------
  publish-pr:
    name: Publish PR manifests
    needs: [detect-changes, build]
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    concurrency:
      group: pr-publish-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    runs-on: [runs-on, family=c7i-flex.xlarge, spot=false, "run-id=${{ github.run_id }}-publish-pr"]
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: wendyos

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: wendyos/tools/publisher/go.mod
          cache-dependency-path: wendyos/tools/publisher/go.sum

      - name: Download manifest entries
        uses: actions/download-artifact@v4
        with:
          pattern: manifest-entry-*
          path: manifest-entries
          merge-multiple: true

      - name: Write PR device manifests
        run: |
          set -euo pipefail
          shopt -s nullglob
          entries=("$GITHUB_WORKSPACE"/manifest-entries/*.json)
          if [[ ${#entries[@]} -eq 0 ]]; then
            echo "::warning::No manifest entries found (did every build fail?); nothing to publish."
            exit 0
          fi
          TOKEN=$(gcloud auth print-access-token)
          cd "$GITHUB_WORKSPACE/wendyos/tools/publisher"
          go build -o "$RUNNER_TEMP/publisher" .
          for entry in "${entries[@]}"; do
            echo "::group::apply $(basename "$entry")"
            cat "$entry"
            "$RUNNER_TEMP/publisher" --apply-metadata "$entry" --access-token "$TOKEN"
            echo "::endgroup::"
          done

      - name: Update PR master manifest
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          entries=("$GITHUB_WORKSPACE"/manifest-entries/*.json)
          if [[ ${#entries[@]} -eq 0 ]]; then
            echo "No manifest entries; skipping PR master manifest update."
            exit 0
          fi
          TOKEN=$(gcloud auth print-access-token)
          cd "$GITHUB_WORKSPACE/wendyos/tools/publisher"
          [[ -x "$RUNNER_TEMP/publisher" ]] || go build -o "$RUNNER_TEMP/publisher" .
          readarray -t rows < <(jq -sc '[.[] | {device, version}] | unique_by(.device) | .[]' "${entries[@]}")
          for row in "${rows[@]}"; do
            DEVICE=$(jq -r .device <<<"$row")
            VERSION=$(jq -r .version <<<"$row")
            "$RUNNER_TEMP/publisher" --device "$DEVICE" --version "$VERSION" --pr "$PR_NUMBER" --master-manifest-only --nightly --access-token "$TOKEN" </dev/null
          done
