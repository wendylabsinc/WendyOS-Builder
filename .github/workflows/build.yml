name: Build WendyOS Images

on:
  push:
    branches: [main]
    tags:
      # Release tags are plain MAJOR.MINOR.PATCH - no 'v' prefix anywhere
      # (git tags, GitHub releases, and GCS manifests all use the same string).
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
  workflow_dispatch:
    inputs:
      device:
        description: "Target device. 'all' builds every device."
        type: choice
        required: false
        default: all
        options:
          - all
          - raspberry-pi-3
          - raspberry-pi-4
          - raspberry-pi-5
          - jetson-agx-orin
          - jetson-orin-nano
          - jetson-agx-thor
      version:
        description: "Git ref (commit SHA, tag, or branch) to build. Empty = latest main."
        type: string
        required: false
        default: ""
      debug:
        description: "Enable WENDYOS_DEBUG (debug tools) on all devices. Auto-enabled on nightly builds; use this to opt in on release builds triggered by promote.yml."
        type: boolean
        required: false
        default: false
      sshd:
        description: "Enable WENDYOS_SSHD (SSH server) on all devices. Must be set explicitly — not auto-enabled on nightly builds."
        type: boolean
        required: false
        default: false

# Never let two runs for the same ref overlap: the failing nightly on
# 2026-06-04 had two main-push runs uploading and publishing the same
# version concurrently (4 writers per device manifest). PR runs cancel
# superseded builds; main/tag runs queue instead so a publish in progress
# is never killed halfway.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # detect-changes: compute the build matrix.
  # On main / workflow_dispatch we always build every device (nightly).
  # On pull_request we prune to only the devices whose paths actually changed.
  # Any change touching a "global" path (distro conf, shared recipes, the
  # workflow itself, etc.) falls back to building every device.
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect affected devices
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      devices: ${{ steps.set.outputs.devices }}
      version: ${{ steps.version.outputs.version }}
      is-release: ${{ steps.version.outputs.is-release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.version }}

      # Compute the build version exactly once so every matrix job and the
      # publish job agree on a single version string for the whole run.
      #   tag push        -> MAJOR.MINOR.PATCH (the tag itself, no 'v')
      #   main / dispatch -> nightly-YYYYMMDDTHHMMSS
      - id: version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$REF_TYPE" == "tag" ]]; then
            VERSION="${REF_NAME#v}"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "ERROR: release tag must be MAJOR.MINOR.PATCH (got: $REF_NAME)" >&2
              exit 1
            fi
            # The published version must match what the image believes it is.
            # promote.yml checks this before tagging; this guards manual tags.
            DISTRO_VERSION=$(grep 'DISTRO_VERSION' conf/distro/wendyos.conf | head -1 | sed 's/.*"\(.*\)"/\1/')
            if [[ "$VERSION" != "$DISTRO_VERSION" ]]; then
              echo "ERROR: tag $REF_NAME does not match DISTRO_VERSION=$DISTRO_VERSION in conf/distro/wendyos.conf" >&2
              exit 1
            fi
            echo "is-release=true" >> "$GITHUB_OUTPUT"
          else
            VERSION="nightly-$(date -u +%Y%m%dT%H%M%S)"
            echo "is-release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Build version: $VERSION"

      - id: set
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          INPUT_DEVICE: ${{ inputs.device }}
        run: |
          set -euo pipefail

          ALL_MATRIX='[
            {"device":"raspberry-pi-3","storage":"sd"},
            {"device":"raspberry-pi-4","storage":"sd"},
            {"device":"raspberry-pi-5","storage":"sd"},
            {"device":"raspberry-pi-5","storage":"nvme"},
            {"device":"jetson-agx-orin","storage":"nvme"},
            {"device":"jetson-agx-orin","storage":"emmc"},
            {"device":"jetson-orin-nano","storage":"nvme"},
            {"device":"jetson-agx-thor","storage":"nvme"}
          ]'
          # Collapse to one line so it can be written to $GITHUB_OUTPUT, which
          # requires single-line key=value pairs (no implicit multiline support).
          ALL_MATRIX=$(echo "${ALL_MATRIX}" | jq -c .)

          emit_all() {
            echo "matrix={\"include\":${ALL_MATRIX}}" >> "$GITHUB_OUTPUT"
            echo "devices=raspberry-pi-3 raspberry-pi-4 raspberry-pi-5 jetson-agx-orin jetson-orin-nano jetson-agx-thor" >> "$GITHUB_OUTPUT"
          }

          emit_one() {
            local dev="$1"
            local entries
            entries=$(echo "${ALL_MATRIX}" | jq -c "[.[] | select(.device == \"${dev}\")]")
            if [[ "$(echo "${entries}" | jq 'length')" -eq 0 ]]; then
              echo "ERROR: Unknown device '${dev}'." >&2
              exit 1
            fi
            echo "matrix={\"include\":${entries}}" >> "$GITHUB_OUTPUT"
            echo "devices=${dev}"                    >> "$GITHUB_OUTPUT"
          }

          # Non-PR triggers: build everything by default. workflow_dispatch can
          # narrow to a single device via the 'device' input ('' or 'all' = all).
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            DEV="${INPUT_DEVICE:-all}"
            if [[ -z "${DEV}" || "${DEV}" == "all" ]]; then
              echo "Trigger=${EVENT_NAME} device=all: building all devices."
              emit_all
            else
              echo "Trigger=${EVENT_NAME} device=${DEV}: building one device."
              emit_one "${DEV}"
            fi
            exit 0
          fi

          CHANGED=$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")
          echo "Changed files:"
          printf '  %s\n' ${CHANGED:-<none>}

          # Paths whose change can affect any device. Conservative: anything
          # that isn't clearly board/machine-scoped is treated as global.
          GLOBAL_RE='^(conf/distro/|conf/template/include/|conf/layer\.conf$|classes/|recipes-|wic/|scripts/|Makefile$|bootstrap\.sh$|\.github/workflows/build\.yml$)'

          if echo "${CHANGED}" | grep -Eq "${GLOBAL_RE}"; then
            echo "Global path changed -> building all devices."
            emit_all
            exit 0
          fi

          # Per-device path patterns. meta-rpi-extensions affects every Pi;
          # meta-tegra-extensions affects Jetson only.
          declare -A DEV_RE=(
            [raspberry-pi-3]='(^conf/template/boards/rpi3-sd/|^conf/machine/raspberrypi3-64-wendyos\.conf$|^meta-rpi-extensions/)'
            [raspberry-pi-4]='(^conf/template/boards/rpi4-sd/|^conf/machine/raspberrypi4-64-wendyos\.conf$|^meta-rpi-extensions/)'
            [raspberry-pi-5]='(^conf/template/boards/rpi5-(sd|nvme)/|^conf/machine/raspberrypi5(-nvme)?-wendyos\.conf$|^meta-rpi-extensions/)'
            [jetson-agx-orin]='(^conf/template/boards/jetson-agx-orin(-emmc)?/|^conf/machine/jetson-agx-orin-devkit-(nvme|emmc)-wendyos\.conf$|^meta-tegra-extensions/)'
            [jetson-orin-nano]='(^conf/template/boards/jetson-orin-nano-(nvme|sd)/|^conf/machine/jetson-orin-nano-devkit(-nvme)?-wendyos\.conf$|^meta-tegra-extensions/)'
            [jetson-agx-thor]='(^conf/template/boards/jetson-agx-thor/|^conf/machine/jetson-agx-thor-devkit-nvme-wendyos\.conf$|^meta-tegra-extensions-jp7/)'
          )

          INCLUDED=()
          DEVICES=()
          for dev in raspberry-pi-3 raspberry-pi-4 raspberry-pi-5 jetson-agx-orin jetson-orin-nano jetson-agx-thor; do
            if echo "${CHANGED}" | grep -Eq "${DEV_RE[$dev]}"; then
              while IFS= read -r entry; do
                INCLUDED+=("$entry")
              done < <(echo "${ALL_MATRIX}" | jq -c ".[] | select(.device == \"${dev}\")")
              DEVICES+=("${dev}")
            fi
          done

          if [[ ${#INCLUDED[@]} -eq 0 ]]; then
            echo "No device-affecting paths changed -> empty matrix (build job will be skipped)."
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'devices='              >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Building devices: ${DEVICES[*]}"
          MATRIX="{\"include\":[$(IFS=,; echo "${INCLUDED[*]}")]}"
          echo "matrix=${MATRIX}"      >> "$GITHUB_OUTPUT"
          echo "devices=${DEVICES[*]}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # build: per-device Yocto image build.
  # Runner uses c8id.8xlarge (32 vCPU,64 GiB, 1.9 TB local nvme so we don't 
  # bump into EBS storage throughput caps.
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.device }} (${{ matrix.storage }})
    needs: detect-changes
    if: needs.detect-changes.outputs.devices != ''
    permissions:
      contents: read
      id-token: write
    runs-on:
      - runs-on
      - family=c8id.8xlarge
      - spot=false
      # Custom AMI built by .github/workflows/build-ami.yml. Has the Yocto
      # host prerequisites preinstalled and upstream layer repos pre-cloned at
      # the SRCREVs pinned by scripts/upstream-repos.env, so this job skips
      # apt-get and 'docker build' entirely.
      - image=wendyos-builder
      - run-id=${{ github.run_id }}-${{ matrix.device }}-${{ matrix.storage }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    env:
      CACHE_BUCKET: ${{ vars.WENDYOS_BUILD_CACHE_BUCKET }}
      CACHE_REGION: ${{ vars.WENDYOS_BUILD_CACHE_REGION }}
      WENDYOS_HOST_BUILD: "1"
      WENDYOS_REPO_CACHE_DIR: /opt/wendyos-cache/repos

    steps:
      - name: Fix workspace permissions
        run: sudo chown "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: wendyos
          ref: ${{ inputs.version }}

      # ---------- Build cache: two-layer ----------
      # L1 (per-runner snapshot): runs-on/snapshot mounts an EBS volume at
      #     sstate-cache/ and downloads/ and snapshots it on workflow end.
      #     Fast path, survives across runs on the same runner family
      #     without copying anything.
      # L2 (S3 mirror):  shared across every matrix entry / runner family,
      #     and acts as the fallback when the snapshot misses (cold runner).
      # We deliberately snapshot ONLY sstate-cache/ and downloads/, never
      # build/, build/ contains mender per-run state that previously made
      # workspace-wide snapshots flaky. sstate is content-hashed so it is
      # always safe to reuse.

      - name: Pre-create snapshot mount points
        # runs-on/snapshot requires the target path to already exist; it
        # mounts an EBS volume on top, it does not create the directory.
        run: |
          mkdir -p \
            "$GITHUB_WORKSPACE/sstate-cache" \
            "$GITHUB_WORKSPACE/downloads"

      - name: Restore sstate-cache snapshot (L1)
        uses: runs-on/snapshot@v1
        with:
          path: ${{ github.workspace }}/sstate-cache
          # The snapshot lineage is shared by every matrix job (keyed on this
          # path + branch), so the volume converges to the union of all nine
          # boards' sstate and nothing prunes it. 150 GB filled up once the
          # Thor board joined the matrix, killing builds with BitBake's
          # STOPTASKS disk monitor. Note runs-on/snapshot discards a snapshot
          # SMALLER than volume_size and starts a blank volume instead, so
          # raising this forces one cold run (sstate re-restored from S3) and
          # snapshots at the new size from then on. EBS snapshot cost scales
          # with used blocks, not volume size, so headroom is nearly free.
          volume_size: 400

      - name: Make L1 EBS mount writable
        run: sudo chmod -R a+rwX "$GITHUB_WORKSPACE/sstate-cache"

      - name: Configure AWS credentials for build cache
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BUILD_CACHE_ROLE_ARN }}
          aws-region: ${{ vars.WENDYOS_BUILD_CACHE_REGION }}

      - name: Restore sstate-cache and downloads from S3 (L2)
        run: |
          set -euo pipefail
          # Prefer s5cmd (parallel S3 client baked into the AMI). Fall back
          # to `aws s3 sync` so this step keeps working through the AMI rebuild
          # window after install-build-deps.sh changes land.
          # NOTE: deliberately no `|| true` — a real failure (IAM regression,
          # bucket typo, etc.) should fail the step loudly. s5cmd exits 0 when
          # there's simply nothing to transfer.
          if command -v s5cmd >/dev/null 2>&1; then
            s3_sync() {
              # --size-only matches the prior aws-cli behavior; sstate filenames
              # are content-hashed so size is a reliable freshness check.
              s5cmd sync --size-only "$1" "$2"
            }
            src_sstate_glob="s3://${CACHE_BUCKET}/sstate-cache/*"
            src_downloads_glob="s3://${CACHE_BUCKET}/downloads/*"
          else
            echo "::warning::s5cmd not found on runner; falling back to aws s3 sync"
            s3_sync() {
              aws s3 sync --no-progress --size-only "$1" "$2"
            }
            src_sstate_glob="s3://${CACHE_BUCKET}/sstate-cache/"
            src_downloads_glob="s3://${CACHE_BUCKET}/downloads/"
          fi

          # Wrap each sync with timing + before/after size so the step is
          # self-documenting even on no-op runs.
          run_sync() {
            local label="$1" src="$2" dst="$3" local_dir="$4"
            echo "::group::$label"
            echo "src=$src"
            echo "dst=$dst"
            if [[ -d "$local_dir" ]]; then
              echo "local before: $(du -sh "$local_dir" 2>/dev/null | cut -f1) ($(find "$local_dir" -type f 2>/dev/null | wc -l) files)"
            fi
            local start; start=$(date +%s)
            s3_sync "$src" "$dst"
            echo "elapsed: $(( $(date +%s) - start ))s"
            if [[ -d "$local_dir" ]]; then
              echo "local after:  $(du -sh "$local_dir" 2>/dev/null | cut -f1) ($(find "$local_dir" -type f 2>/dev/null | wc -l) files)"
            fi
            echo "::endgroup::"
          }

          # If the L1 EBS snapshot already restored a non-trivial sstate-cache,
          # skip the L2 sstate restore — at warm-cache scale (>200k objects)
          # the redundant HEAD requests cost more than they save.
          # NOTE: counted with a pipe-free idiom on purpose. `find ... | head | wc -l`
          # under `set -o pipefail` aborts on warm caches because head closes
          # stdin early and find SIGPIPEs — the exact case we're trying to detect.
          # maxdepth 5 covers both the legacy flat layout (sstate-cache/<aa>/<bb>/file)
          # and the per-tree partitioned layout introduced with split-poky
          # (sstate-cache/<tree>/<aa>/<bb>/file). Future-proof for one extra
          # nesting level if BitBake ever changes its hash directory scheme.
          warm_threshold=500
          sstate_files=0
          if [[ -d "$GITHUB_WORKSPACE/sstate-cache" ]]; then
            while IFS= read -r _; do
              sstate_files=$((sstate_files + 1))
              if [[ "$sstate_files" -ge "$warm_threshold" ]]; then break; fi
            done < <(find "$GITHUB_WORKSPACE/sstate-cache" -mindepth 2 -maxdepth 5 -type f -print 2>/dev/null)
          fi

          if [[ "$sstate_files" -lt "$warm_threshold" ]]; then
            echo "Cold sstate-cache (${sstate_files} files seen); restoring from S3"
            run_sync "restore sstate-cache" "${src_sstate_glob}" "$GITHUB_WORKSPACE/sstate-cache/" "$GITHUB_WORKSPACE/sstate-cache"
          else
            echo "Warm sstate-cache (>=${warm_threshold} files seen via L1 snapshot); skipping S3 restore"
          fi

          # downloads/ is not in the L1 snapshot, so always restore from S3.
          run_sync "restore downloads" "${src_downloads_glob}" "$GITHUB_WORKSPACE/downloads/" "$GITHUB_WORKSPACE/downloads"

          # S3 sync only transfers files, so empty directories are lost on the
          # round-trip. A bare git mirror with fully-packed refs has an empty
          # refs/ dir, and git refuses to recognize the repo without it
          # ("fatal: not a git repository"). BitBake then re-clones every git2
          # mirror from upstream — and fails the build outright when upstream
          # is down (e.g. iso-codes on salsa.debian.org). Recreate refs/, and
          # drop any mirror git still can't read together with its .done
          # marker so BitBake falls back to the mirror tarball or upstream
          # instead of choking on a broken clonedir.
          if [[ -d "$GITHUB_WORKSPACE/downloads/git2" ]]; then
            for repo in "$GITHUB_WORKSPACE/downloads/git2"/*/; do
              [[ -f "$repo/HEAD" ]] || continue
              mkdir -p "$repo/refs"
              if ! git -C "$repo" rev-parse --git-dir >/dev/null 2>&1; then
                echo "::warning::Dropping unreadable git mirror $repo"
                rm -rf "$repo" "${repo%/}.done"
              fi
            done
          fi

      # ---------- Build ----------

      - name: Derive build variables
        id: vars
        env:
          DEVICE: ${{ matrix.device }}
          STORAGE: ${{ matrix.storage }}
        run: |
          case "$DEVICE:$STORAGE" in
            raspberry-pi-3:sd)    BOARD=rpi3-sd;               MACHINE=raspberrypi3-64-wendyos ;;
            raspberry-pi-4:sd)    BOARD=rpi4-sd;               MACHINE=raspberrypi4-64-wendyos ;;
            raspberry-pi-5:sd)    BOARD=rpi5-sd;               MACHINE=raspberrypi5-wendyos ;;
            raspberry-pi-5:nvme)  BOARD=rpi5-nvme;             MACHINE=raspberrypi5-nvme-wendyos ;;
            jetson-agx-orin:nvme) BOARD=jetson-agx-orin;       MACHINE=jetson-agx-orin-devkit-nvme-wendyos ;;
            jetson-agx-orin:emmc) BOARD=jetson-agx-orin-emmc;  MACHINE=jetson-agx-orin-devkit-emmc-wendyos ;;
            jetson-orin-nano:nvme) BOARD=jetson-orin-nano-nvme; MACHINE=jetson-orin-nano-devkit-nvme-wendyos ;;
            jetson-agx-thor:nvme) BOARD=jetson-agx-thor;       MACHINE=jetson-agx-thor-devkit-nvme-wendyos ;;
            *) echo "Unknown device/storage: $DEVICE/$STORAGE"; exit 1 ;;
          esac
          echo "board=$BOARD" >> "$GITHUB_OUTPUT"
          echo "machine=$MACHINE" >> "$GITHUB_OUTPUT"

      - name: Bootstrap build environment
        working-directory: ${{ github.workspace }}
        env:
          BOARD: ${{ steps.vars.outputs.board }}
        # WENDYOS_HOST_BUILD and WENDYOS_REPO_CACHE_DIR are inherited from the
        # job-level env block above. Host-build mode skips the Docker image
        # creation; the repo cache seeds repos/ from the AMI's bake-time clones.
        run: ./wendyos/bootstrap.sh

      - name: Enable debug for nightly builds
        # Release images are production builds — no debug tools by default.
        # Nightly and workflow_dispatch builds get debug tooling so CI-flashed
        # devices include diagnostic utilities out of the box. Release builds
        # triggered by promote.yml can opt in via inputs.debug.
        if: (needs.detect-changes.outputs.is-release != 'true' && github.event_name != 'pull_request') || inputs.debug == true
        run: |
          {
            echo ''
            echo '# Nightly CI: enable debug tooling on all devices'
            echo 'WENDYOS_DEBUG = "1"'
          } >> "$GITHUB_WORKSPACE/build/conf/auto.conf"

      - name: Enable SSH when explicitly requested
        # SSH is disabled by default (WENDYOS_SSHD ??= "0" in common.inc).
        # Pass inputs.sshd = true on workflow_dispatch or promote.yml to opt in.
        if: inputs.sshd == true
        run: |
          {
            echo ''
            echo '# CI: enable SSH server on all devices (explicitly requested)'
            echo 'WENDYOS_SSHD = "1"'
          } >> "$GITHUB_WORKSPACE/build/conf/auto.conf"

      # Note: SSTATE_DIR / DL_DIR are pinned to ${TOPDIR}/../{sstate-cache,downloads}
      # by conf/template/include/local/common.inc, which matches the S3 sync paths
      # below, no auto.conf override needed.

      # Resolve the latest *stable* wendyos-agent release (tag + asset sha256)
      # and export them so the wendyos-agent recipe pins this exact version.
      # This is what makes "ship the latest agent on every run" actually work:
      # the recipe embeds the version + checksum in SRC_URI, so a new release
      # changes the do_fetch signature and sstate re-fetches instead of reusing
      # a stale cached binary. Authenticated to avoid the 60/hr anon API limit.
      - name: Resolve latest wendyos-agent version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_json="$(curl -sSfL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/wendylabsinc/WendyOS/releases/latest")"

          version="$(jq -r '.tag_name' <<<"$release_json")"
          sha="$(jq -r '.assets[]
            | select(.name | test("^wendy-agent-linux-arm64-.*\\.tar\\.gz$"))
            | .digest' <<<"$release_json" | sed 's/^sha256://')"

          if [[ -z "$version" || "$version" == "null" || -z "$sha" || "$sha" == "null" ]]; then
            echo "Failed to resolve wendyos-agent version/sha (version='$version' sha='$sha')" >&2
            exit 1
          fi

          echo "Resolved wendyos-agent $version (sha256=$sha)"
          {
            echo "WENDYOS_AGENT_VERSION=$version"
            echo "WENDYOS_AGENT_SHA256=$sha"
          } >> "$GITHUB_ENV"

      - name: Build image
        working-directory: ${{ github.workspace }}/wendyos
        env:
          MACHINE: ${{ steps.vars.outputs.machine }}
        run: make build MACHINE="$MACHINE"

      # ---------- Build cache: save to S3 ----------------------------------
      # L1 snapshots are saved automatically by runs-on/snapshot at workflow
      # end. L2 (S3) we push explicitly so other matrix entries / future
      # runners can prime from it.

      # Re-assume the role for a fresh STS token before uploading. The
      # credentials configured at job start expire after the default 1h
      # session, and a cold blacksail build now runs longer than that — so by
      # the time we reach the upload the original token is dead ("ExpiredToken:
      # The provided token has expired"). Bumping role-duration-seconds alone
      # would also require raising the IAM role's MaxSessionDuration; refreshing
      # here is self-contained and gives the upload a full fresh hour.
      # if: always() mirrors the save step so the cache still uploads after a
      # failed build.
      - name: Refresh AWS credentials for cache upload
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BUILD_CACHE_ROLE_ARN }}
          aws-region: ${{ vars.WENDYOS_BUILD_CACHE_REGION }}

      - name: Save sstate-cache and downloads to S3 (L2)
        if: always()
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          # --size-only avoids re-uploading sstate siblings whose mtime drifted
          # but content matches. Sstate filenames are content-hashed, so file
          # size is a reliable freshness check.
          # NOTE: deliberately no `|| true` — a real failure (IAM regression,
          # bucket typo, etc.) should fail the step loudly. s5cmd exits 0 when
          # there's simply nothing to transfer.
          if command -v s5cmd >/dev/null 2>&1; then
            s3_save() {
              s5cmd sync --size-only "$1" "$2"
            }
            sstate_src="$GITHUB_WORKSPACE/sstate-cache/*"
            downloads_src="$GITHUB_WORKSPACE/downloads/*"
          else
            echo "::warning::s5cmd not found on runner; falling back to aws s3 sync"
            s3_save() {
              aws s3 sync --no-progress --size-only "$1" "$2"
            }
            sstate_src="$GITHUB_WORKSPACE/sstate-cache/"
            downloads_src="$GITHUB_WORKSPACE/downloads/"
          fi

          run_save() {
            local label="$1" src="$2" dst="$3" local_dir="$4"
            echo "::group::$label"
            echo "src=$src"
            echo "dst=$dst"
            if [[ -d "$local_dir" ]]; then
              echo "local: $(du -sh "$local_dir" 2>/dev/null | cut -f1) ($(find "$local_dir" -type f 2>/dev/null | wc -l) files)"
            fi
            local start; start=$(date +%s)
            s3_save "$src" "$dst"
            echo "elapsed: $(( $(date +%s) - start ))s"
            echo "::endgroup::"
          }

          if [[ -d "$GITHUB_WORKSPACE/sstate-cache" ]]; then
            run_save "save sstate-cache" "${sstate_src}" "s3://${CACHE_BUCKET}/sstate-cache/" "$GITHUB_WORKSPACE/sstate-cache"
          else
            echo "No sstate-cache directory present; skipping sstate upload"
          fi

          # Skip the downloads/ upload on PR builds: PRs only need to *read*
          # the cache, and a PR that pulls a brand-new source tarball is rare.
          # When merged to main, that build re-fetches and writes back. Saves
          # ~minutes of upload churn on every PR.
          if [[ "$GH_EVENT_NAME" != "pull_request" && -d "$GITHUB_WORKSPACE/downloads" ]]; then
            run_save "save downloads" "${downloads_src}" "s3://${CACHE_BUCKET}/downloads/" "$GITHUB_WORKSPACE/downloads"
          else
            echo "Skipping downloads/ upload (event=${GH_EVENT_NAME})"
          fi

      # --- Upload image and update device manifest (master manifest is handled by the publish job) ---

      - name: Fix deploy directory permissions
        if: github.event_name != 'pull_request'
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}/build/tmp/deploy" 2>/dev/null || true

      # Rootfs sizes are pinned per platform (8 GiB RPi / 12 GiB Jetson,
      # conf/distro/include/wendyos-rootfs-size.inc): the deployed ext4 and the
      # .wendy OTA payload must be EXACTLY that size on every build, so nightly
      # and release artifacts are byte-identical in size and an OTA image can
      # never outgrow the on-device A/B slot (docs/plans/fixed-rootfs-sizes.md).
      # Belt-and-braces on top of the bitbake floor==ceiling pin and the
      # image_types_wendy pack-time assert; runs on PRs too so drift fails fast.
      - name: Verify pinned rootfs size
        env:
          DEPLOY_DIR: ${{ github.workspace }}/build/tmp/deploy/images/${{ steps.vars.outputs.machine }}
          DEVICE: ${{ matrix.device }}
        run: |
          set -euo pipefail
          EXPECTED_KB=12582912  # 12 GiB, Jetson
          case "$DEVICE" in
            raspberry-pi-*) EXPECTED_KB=8388608 ;;  # 8 GiB, RPi
          esac
          EXPECTED=$((EXPECTED_KB * 1024))

          EXT4=$(sudo find "$DEPLOY_DIR" -maxdepth 1 -name 'wendyos-image-*.ext4' ! -type l -print -quit)
          [[ -n "$EXT4" ]] || { echo "::error::no deployed wendyos-image ext4 found in $DEPLOY_DIR"; exit 1; }
          ACTUAL=$(sudo stat -Lc %s "$EXT4")
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "::error::rootfs ext4 $EXT4 is $ACTUAL bytes; the pinned size for $DEVICE is $EXPECTED"
            exit 1
          fi

          WENDY=$(sudo find "$DEPLOY_DIR" -maxdepth 1 -name 'wendyos-image-*.wendy' ! -type l -print -quit)
          [[ -n "$WENDY" ]] || { echo "::error::no .wendy OTA artifact found in $DEPLOY_DIR"; exit 1; }
          PAYLOAD=$(sudo tar -xOf "$WENDY" manifest.json | python3 -c 'import json,sys; print(json.load(sys.stdin)["payload"]["size"])')
          if [[ "$PAYLOAD" != "$EXPECTED" ]]; then
            echo "::error::.wendy payload.size is $PAYLOAD bytes; the pinned size for $DEVICE is $EXPECTED"
            exit 1
          fi
          echo "rootfs size OK: ext4 and .wendy payload are exactly $EXPECTED bytes ($((EXPECTED_KB / 1048576)) GiB)"

      # SBOMs are generated by the create-spdx class (enabled in
      # conf/distro/wendyos.conf) as a byproduct of every image build, so they
      # exist on PRs too. Stage them into a flat dir for the artifact upload
      # (and, on non-PR builds, for the publisher --sbom flag below). sudo/-L:
      # on PRs the deploy dir is root-owned (the chown step above is skipped)
      # and the SPDX files are versioned symlinks.
      - name: Stage SPDX SBOM artifacts
        id: sbom
        env:
          DEPLOY_DIR: ${{ github.workspace }}/build/tmp/deploy/images/${{ steps.vars.outputs.machine }}
        run: |
          set -euo pipefail
          STAGE="$GITHUB_WORKSPACE/sbom"
          mkdir -p "$STAGE"
          found=0
          # '*.spdx.json' also matches the '*.spdx.index.json' index, so the
          # bundle + both JSON documents are captured by these two patterns.
          for pat in '*.spdx.tar.zst' '*.spdx.json'; do
            while IFS= read -r -d '' f; do
              sudo cp -Lf "$f" "$STAGE/"
              found=1
            done < <(sudo find "$DEPLOY_DIR" -maxdepth 1 -name "$pat" -print0 2>/dev/null || true)
          done
          sudo chown -R "$(id -u):$(id -g)" "$STAGE"
          if [[ "$found" -eq 1 ]]; then
            echo "Staged SBOM files:"; ls -la "$STAGE"
            # The .spdx.tar.zst bundle is the canonical, self-contained SBOM
            # deliverable recorded in the manifest; the index JSON rides along.
            BUNDLE=$(find "$STAGE" -maxdepth 1 -name '*.spdx.tar.zst' -print -quit || true)
            echo "bundle=$BUNDLE" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No SPDX SBOM artifacts found in $DEPLOY_DIR"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SBOM artifact
        if: steps.sbom.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.device }}-${{ matrix.storage }}
          path: sbom/
          if-no-files-found: error
          retention-days: 14
          # v4 artifacts are immutable per name; overwrite lets a re-run of a
          # failed build replace the artifact from the earlier attempt.
          overwrite: true

      - name: Authenticate to Google Cloud
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Go
        if: github.event_name != 'pull_request'
        uses: actions/setup-go@v5
        with:
          go-version-file: wendyos/tools/publisher/go.mod
          cache-dependency-path: wendyos/tools/publisher/go.sum

      - name: Install flashable image dependencies (Jetson only)
        if: github.event_name != 'pull_request' && startsWith(matrix.device, 'jetson-')
        run: |
          sudo apt-get update
          # simg2img (android-sdk-libsparse-utils) converts Android sparse ext4
          # images to raw; make-thor-nvme-img.py needs it to write APP/APP_b into
          # the offline disk image. Every blacksail Jetson (Thor + all Orins on
          # WENDYOS_OTA=wendy) now builds its NVMe/SD image via that script, so
          # install it for all Jetson devices rather than Thor alone.
          sudo apt-get install -y device-tree-compiler android-sdk-libsparse-utils

      - name: Generate flashable image (Jetson)
        if: github.event_name != 'pull_request' && startsWith(matrix.device, 'jetson-')
        env:
          DEPLOY_DIR: ${{ github.workspace }}/build/tmp/deploy/images/${{ steps.vars.outputs.machine }}
          MACHINE: ${{ steps.vars.outputs.machine }}
          STORAGE: ${{ matrix.storage }}
        run: |
          # Per-MACHINE, freshly wiped staging dir. A fixed shared path
          # ($GITHUB_WORKSPACE/flash-work) on persistent snapshot runners with no
          # cleanup let one Jetson's extracted tegraflash-tar leak into the next
          # build, so an AGX image could be assembled and shipped under the Orin
          # Nano key. Scope by MACHINE and wipe so every build starts clean.
          FLASH_WORKDIR="$GITHUB_WORKSPACE/flash-work/${MACHINE}"
          rm -rf "$FLASH_WORKDIR"
          mkdir -p "$FLASH_WORKDIR"

          # All Jetsons run the wendy/blacksail OTA stack (WENDYOS_OTA=wendy):
          # IMAGE_FSTYPES emits a single 'tegraflash-tar' bundle that does NOT
          # ship the doexternal.sh / dosdcard.sh helper scripts.
          # make-thor-nvme-img.py reimplements their offline GPT image creation
          # by parsing external-flash.xml.in and writing each partition's binary
          # at the correct sector offset. The resulting wendyos-nvme.img is the
          # primary artifact for `wendy os install` (dd-based provisioning);
          # the tegraflash-tar bundle remains the recovery-flash artifact.
          TEGRAFLASH_TAR="$DEPLOY_DIR/wendyos-image-${MACHINE}.tegraflash-tar"
          tar -xf "$TEGRAFLASH_TAR" -C "$FLASH_WORKDIR"
          # external-flash.xml.in describes the external NVMe boot/root device.
          # eMMC builds are internal-only and ship no such layout; the SD-card
          # Orin Nano is not a CI target (its layout lives in a <device
          # type="sdcard"> block, not external-flash.xml.in, and the blacksail
          # bundle no longer ships dosdcard.sh to build it). For those the
          # tegraflash-tar bundle itself is the flash artifact — nothing to do.
          # Write the offline NVMe image into the MACHINE-scoped deploy dir, not a
          # fixed workspace path, so the upload step can never pick up another
          # Jetson's image. Remove any prior copy first.
          NVME_IMG="$DEPLOY_DIR/wendyos-image-${MACHINE}-nvme.img"
          rm -f "$NVME_IMG"
          if [[ -f "$FLASH_WORKDIR/external-flash.xml.in" && "$DEVICE" != "jetson-agx-thor" ]]; then
            python3 "$GITHUB_WORKSPACE/wendyos/scripts/make-thor-nvme-img.py" \
              "$FLASH_WORKDIR" "$NVME_IMG"
          else
            echo "No offline NVMe image for $DEVICE (storage=$STORAGE); the tegraflash-tar is the flash artifact."
          fi

      - name: Build Thor flashpack
        # Pack the extracted tegraflash-tar into the single .tar.zst the wendy CLI
        # flashes (see make-thor-flashpack.sh). The NVIDIA flash tools it runs are
        # i386, so this x86_64 runner needs i386 runtime libs.
        if: github.event_name != 'pull_request' && matrix.device == 'jetson-agx-thor'
        env:
          UPLOAD_VERSION: ${{ needs.detect-changes.outputs.version }}
          MACHINE: ${{ steps.vars.outputs.machine }}
        run: |
          set -euo pipefail
          FLASH_WORKDIR="$GITHUB_WORKSPACE/flash-work/${MACHINE}"   # MACHINE-scoped, matches the generate step
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq libc6:i386 libstdc++6:i386 zlib1g:i386 device-tree-compiler zstd
          "$GITHUB_WORKSPACE/wendyos/scripts/make-thor-flashpack.sh" \
            --bundle-dir "$FLASH_WORKDIR" \
            --out "$GITHUB_WORKSPACE/thor-flashpack" \
            --version "$UPLOAD_VERSION"
          echo "FLASHPACK_FILE=$GITHUB_WORKSPACE/thor-flashpack/wendyos-${UPLOAD_VERSION}-jetson-agx-thor.flashpack.tar.zst" >> "$GITHUB_ENV"

      - name: Upload image and emit manifest entry
        if: github.event_name != 'pull_request'
        env:
          DEPLOY_DIR: ${{ github.workspace }}/build/tmp/deploy/images/${{ steps.vars.outputs.machine }}
          MACHINE: ${{ steps.vars.outputs.machine }}
          DEVICE: ${{ matrix.device }}
          STORAGE: ${{ matrix.storage }}
          IS_RELEASE: ${{ needs.detect-changes.outputs.is-release }}
          UPLOAD_VERSION: ${{ needs.detect-changes.outputs.version }}
          SBOM_FILE: ${{ steps.sbom.outputs.bundle }}
        run: |
          TOKEN=$(gcloud auth print-access-token)

          # The wendy/blacksail OTA stack emits a single tegraflash-tar bundle;
          # it doubles as the eMMC image and the Jetson recovery-flash artifact.
          TEGRAFLASH_BUNDLE=""
          if [[ "$MACHINE" != raspberry* ]]; then
            TEGRAFLASH_BUNDLE="$DEPLOY_DIR/wendyos-image-${MACHINE}.tegraflash-tar"
          fi

          BMAP_FILE=""
          if [[ "$MACHINE" != raspberry* && "$STORAGE" == "nvme" && "$DEVICE" != "jetson-agx-thor" ]]; then
            # MACHINE-scoped image written by the generate step (never a fixed
            # shared path). Fail hard if this run did not produce it, rather than
            # uploading a stale image left behind by another Jetson build.
            IMAGE_FILE="$DEPLOY_DIR/wendyos-image-${MACHINE}-nvme.img"
            if [[ ! -f "$IMAGE_FILE" ]]; then
              echo "::error::NVMe image not produced this run for ${DEVICE} (${MACHINE}): ${IMAGE_FILE} missing. Refusing to upload a possibly-stale image." >&2
              exit 1
            fi
            bmaptool create "$IMAGE_FILE" > "${IMAGE_FILE}.bmap"
            BMAP_FILE="${IMAGE_FILE}.bmap"
          elif [[ "$MACHINE" != raspberry* && ( "$STORAGE" == "emmc" || "$DEVICE" == "jetson-agx-thor" ) ]]; then
            # No offline disk image for eMMC or Thor NVMe; the tegraflash bundle
            # is the flash artifact.
            IMAGE_FILE="$TEGRAFLASH_BUNDLE"
          else
            # RPi: Mender emits .sdimg; pre-Mender RPi builds produced
            # .rootfs.wic. Prefer sdimg, fall back to wic.
            if [[ -f "$DEPLOY_DIR/wendyos-image-${MACHINE}.sdimg" ]]; then
              # Resolve the Yocto symlink to the real file before gzipping;
              # gzip fails with ELOOP when the symlink chain is too deep.
              # Use -f to suppress the "has N other links" error from Yocto hard links.
              SDIMG_REAL=$(readlink -f "$DEPLOY_DIR/wendyos-image-${MACHINE}.sdimg")
              # Generate bmap before gzip — bmaptool operates on the raw image.
              bmaptool create "$SDIMG_REAL" > "${SDIMG_REAL}.bmap"
              BMAP_FILE="${SDIMG_REAL}.bmap"
              gzip -f "$SDIMG_REAL"
              IMAGE_FILE="${SDIMG_REAL}.gz"
            else
              IMAGE_FILE="$DEPLOY_DIR/wendyos-image-${MACHINE}.rootfs.wic"
              bmaptool create "$IMAGE_FILE" > "${IMAGE_FILE}.bmap"
              BMAP_FILE="${IMAGE_FILE}.bmap"
            fi
          fi

          # Upload-only: files are pushed to GCS here, but ALL manifest writes
          # are deferred to the single serialised publish job. Parallel matrix
          # entries must never read-modify-write shared manifests (412 races,
          # lost updates). The entry JSON below is the handoff.
          ENTRY_FILE="$GITHUB_WORKSPACE/manifest-entry-${DEVICE}-${STORAGE}.json"
          ARGS=(
            --device "$DEVICE"
            --version "$UPLOAD_VERSION"
            --file "$IMAGE_FILE"
            --access-token "$TOKEN"
            --upload-only
            --metadata-out "$ENTRY_FILE"
          )

          if [[ "$IS_RELEASE" != "true" ]]; then
            ARGS+=(--nightly)
          fi

          # For all Jetson targets, include the tegraflash bundle as the recovery file
          # (used for USB recovery-mode flashing via tegraflash.py / initrd-flash).
          # wendy/blacksail builds use .tegraflash-tar (JP7/r38.4.x renamed the
          # type); legacy mender builds use .tegraflash.tar.gz — resolved above.
          if [[ -n "$TEGRAFLASH_BUNDLE" ]]; then
            ARGS+=(--recovery-file "$TEGRAFLASH_BUNDLE")
          fi

          # Thor: attach the flashpack built in the previous step so the publisher
          # uploads it and records flashpack_path/checksum/size in the manifest.
          if [[ "$DEVICE" == "jetson-agx-thor" && -n "${FLASHPACK_FILE:-}" && -f "$FLASHPACK_FILE" ]]; then
            ARGS+=(--flashpack-file "$FLASHPACK_FILE")
          fi

          # Devices with multiple storage variants pass --storage so the manifest
          # records the correct per-storage-type paths.
          if [[ "$DEVICE" == "jetson-orin-nano" || "$DEVICE" == "jetson-agx-orin" || "$DEVICE" == "raspberry-pi-5" ]]; then
            ARGS+=(--storage "$STORAGE")
          fi

          # Include bmap if one was generated for this image type.
          if [[ -n "$BMAP_FILE" ]]; then
            ARGS+=(--bmap-file "$BMAP_FILE")
          fi

          # Include the OTA update artifact if the build produced one. A board
          # runs either the Mender stack (.mender) or the wendyos-update stack
          # (.wendy), never both — it is gated by WENDYOS_OTA — so both feed the
          # same --ota-update slot / ota_update_path; the device's OTA client
          # interprets the artifact. Neither extension is recompressed by the
          # publisher (only .img/.wic/.sdimg are), so each uploads as-is.
          OTA_FILE=$(find "$DEPLOY_DIR" -maxdepth 1 \
            \( -name "wendyos-image-${MACHINE}*.mender" -o -name "wendyos-image-${MACHINE}*.wendy" \) \
            -print -quit 2>/dev/null || true)
          if [[ -n "$OTA_FILE" ]]; then
            ARGS+=(--ota-update "$OTA_FILE")
          fi

          # Attach the SPDX SBOM bundle staged above. The publisher uploads it
          # to GCS alongside the image (as-is: .zst is not recompressed) and
          # records sbom_path/checksum/size in the manifest entry.
          if [[ -n "${SBOM_FILE:-}" && -f "${SBOM_FILE:-}" ]]; then
            ARGS+=(--sbom "$SBOM_FILE")
          fi

          cd "$GITHUB_WORKSPACE/wendyos/tools/publisher"
          # No retry loop: uploads go to unique per-version paths (no shared
          # state to race on) and the publisher's storage client already
          # retries transient errors internally.
          go run . "${ARGS[@]}"

      - name: Upload manifest entry artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: manifest-entry-${{ matrix.device }}-${{ matrix.storage }}
          path: manifest-entry-${{ matrix.device }}-${{ matrix.storage }}.json
          if-no-files-found: error
          retention-days: 7
          # v4 artifacts are immutable per name; without this, re-running a
          # failed build job 409s on the artifact left by the earlier attempt.
          overwrite: true

  # ---------------------------------------------------------------------------
  # publish: the ONLY writer of GCS manifests. Build jobs upload files and
  # hand over manifest-entry artifacts; this job applies them one at a time,
  # so device and master manifests never see concurrent read-modify-writes
  # from CI. Runs for nightly (main/dispatch) and release (tag) builds.
  # !cancelled(): publish whatever subset of devices built successfully.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish manifests
    needs: [detect-changes, build]
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    concurrency:
      group: update-master-manifest
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    runs-on:
      - runs-on
      - family=c7i-flex.8xlarge
      - spot=false
      - run-id=${{ github.run_id }}-publish
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: wendyos
          ref: ${{ inputs.version }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: wendyos/tools/publisher/go.mod
          cache-dependency-path: wendyos/tools/publisher/go.sum

      - name: Download manifest entries
        uses: actions/download-artifact@v4
        with:
          pattern: manifest-entry-*
          path: manifest-entries
          merge-multiple: true

      # SBOMs from every build job, flattened into one dir. Per-machine SBOM
      # filenames are distinct across devices; storage variants of one device
      # share a machine (hence an identical SBOM), so merge-multiple's
      # last-writer-wins is harmless. Attached to the GitHub release below.
      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          path: sbom-assets
          merge-multiple: true

      - name: Write device manifests
        id: apply
        run: |
          set -euo pipefail
          shopt -s nullglob
          entries=("$GITHUB_WORKSPACE"/manifest-entries/*.json)
          if [[ ${#entries[@]} -eq 0 ]]; then
            echo "::warning::No manifest entries found (did every build fail?); nothing to publish."
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "published=true" >> "$GITHUB_OUTPUT"
          TOKEN=$(gcloud auth print-access-token)
          cd "$GITHUB_WORKSPACE/wendyos/tools/publisher"
          # Build once; up to 15 invocations follow across this step and the
          # master manifest step ($RUNNER_TEMP persists between steps).
          go build -o "$RUNNER_TEMP/publisher" .
          # Applied strictly one at a time: this job is the only manifest
          # writer, so there is nothing to race against and no retry loop.
          for entry in "${entries[@]}"; do
            echo "::group::apply $(basename "$entry")"
            cat "$entry"
            "$RUNNER_TEMP/publisher" --apply-metadata "$entry" --access-token "$TOKEN"
            echo "::endgroup::"
          done

      - name: Update master manifest
        run: |
          set -euo pipefail
          shopt -s nullglob
          entries=("$GITHUB_WORKSPACE"/manifest-entries/*.json)
          if [[ ${#entries[@]} -eq 0 ]]; then
            echo "No manifest entries; skipping master manifest update."
            exit 0
          fi
          TOKEN=$(gcloud auth print-access-token)
          cd "$GITHUB_WORKSPACE/wendyos/tools/publisher"
          # Reuse the binary from the previous step; rebuild only if missing
          # (e.g. this step re-run in isolation).
          [[ -x "$RUNNER_TEMP/publisher" ]] || go build -o "$RUNNER_TEMP/publisher" .
          # One master-manifest write per device that actually published
          # (storage variants of a device share one device manifest, hence
          # unique_by). Devices whose builds failed keep their previous
          # latest pointers instead of being bumped to a version they
          # never produced.
          readarray -t rows < <(jq -sc '[.[] | {device, version, nightly}] | unique_by(.device) | .[]' "${entries[@]}")
          for row in "${rows[@]}"; do
            DEVICE=$(jq -r .device <<<"$row")
            VERSION=$(jq -r .version <<<"$row")
            NIGHTLY=$(jq -r .nightly <<<"$row")
            ARGS=(
              --device "$DEVICE"
              --version "$VERSION"
              --master-manifest-only
              --access-token "$TOKEN"
            )
            if [[ "$NIGHTLY" == "true" ]]; then
              ARGS+=(--nightly)
            fi
            "$RUNNER_TEMP/publisher" "${ARGS[@]}" </dev/null
          done

      - name: Tag nightly pre-release on GitHub
        # Nightly builds only: release tags already exist (created by promote.yml).
        # Skipped when zero entries were published (every build failed) - never
        # tag and announce a nightly that has no images behind it.
        if: ${{ success() && github.ref_type != 'tag' && steps.apply.outputs.published == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.detect-changes.outputs.version }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/wendyos"

          # -f/--force for idempotency: a re-run of this job re-tags the same
          # commit with the same nightly-<timestamp> version.
          git tag -f "$VERSION"
          git push origin "$VERSION" --force

          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $VERSION already exists (job re-run), skipping create."
          else
            gh release create "$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --title "WendyOS $VERSION" \
              --generate-notes \
              --prerelease
          fi

          # Keep the releases page tidy: retain the 7 most recent nightly
          # pre-releases. Git tags are kept forever for traceability and
          # promotion; nightly-YYYYMMDDTHHMMSS sorts chronologically.
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease and (.tagName | startswith("nightly-"))) | .tagName] | sort | reverse | .[7:][]' |
            while read -r old; do
              echo "Pruning old nightly pre-release $old (tag kept)"
              gh release delete "$old" --yes --repo "$GITHUB_REPOSITORY"
            done

      - name: Attach SBOMs to GitHub release
        # Both nightly and release (tag) builds: for nightly the release was
        # just created above; for tags it already exists (from promote.yml).
        # Skipped when nothing published (every build failed).
        if: ${{ success() && steps.apply.outputs.published == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.detect-changes.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=("$GITHUB_WORKSPACE"/sbom-assets/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "::warning::No SBOM assets downloaded; nothing to attach to release $VERSION."
            exit 0
          fi
          # --clobber makes re-runs idempotent (replaces same-named assets).
          gh release upload "$VERSION" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" --clobber

      - name: Send Discord announcement
        # Nightly builds only: release announcements are sent by promote.yml.
        if: ${{ success() && github.ref_type != 'tag' && steps.apply.outputs.published == 'true' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_NIGHTLY_WEBHOOK_URL }}
          VERSION: ${{ needs.detect-changes.outputs.version }}
        run: |
          [[ -z "${DISCORD_WEBHOOK_URL}" ]] && exit 0
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${VERSION}"
          jq -n --arg msg "**WendyOS ${VERSION}** is out! Full changelog and downloads: ${RELEASE_URL}" '{content: $msg}' | \
            curl -fsS -o /dev/null \
              -H "Content-Type: application/json" \
              -d @- \
              "$DISCORD_WEBHOOK_URL"
