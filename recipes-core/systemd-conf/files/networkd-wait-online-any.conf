# WendyOS: network-online.target provider policy (systemd-networkd mode).
#
# When systemd-networkd is the active network manager, make wait-online succeed
# as soon as *any* managed link is online, rather than requiring *all* of them.
# Without this, disconnected NICs (e.g. the Tegra camera-over-ethernet mgbe*
# interfaces) keep the unit waiting until timeout and it fails. This is the
# networkd counterpart of disabling systemd-networkd-wait-online under
# NetworkManager.
[Service]
ExecStart=
ExecStart=/usr/lib/systemd/systemd-networkd-wait-online --any
