# data.mount override for the TPM /data-encryption stack (WENDYOS_ENABLE_TPM). The
# real filesystem lives inside the LUKS container, so mount the unlocked mapper
# device and wait for the crypttab-driven unlock (systemd-cryptsetup@data) instead
# of the raw partition. Installed only when the gate is on, by the
# wendyos-data-setup bbappend.
[Unit]
Requires=systemd-cryptsetup@data.service
After=systemd-cryptsetup@data.service

[Mount]
What=/dev/mapper/data
