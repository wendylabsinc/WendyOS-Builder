BBPATH:prepend := "${LAYERDIR}:"

BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
    "

BBFILE_COLLECTIONS += "wendyos-rpi"
BBFILE_PATTERN_wendyos-rpi := "^${LAYERDIR}/"
BBFILE_PRIORITY_wendyos-rpi = "51"

# scarthgap = the legacy RPi tree (rpi3-sd, rpi4-sd, rpi5-*-scarthgap fallbacks)
# blacksail = the RPi5 boards on blacksail (rpi5-sd, rpi5-nvme)
# Both are listed because the layer's recipes are shared across trees.
# The compat check only needs an intersection with oe-core's active series.
LAYERSERIES_COMPAT_wendyos-rpi = "scarthgap blacksail"
LAYERVERSION_wendyos-rpi = "1"
LAYERDEPENDS_wendyos-rpi = "core wendyos"

# RPi .wks layouts live in files/wic/ — the location blacksail oe-core mandates
# (its sanity checker rejects the older <layer>/wic, and its WKS_SEARCH_PATH only
# searches <layer>/files/wic). blacksail finds them by default; scarthgap's
# WKS_SEARCH_PATH default searches <layer>/wic (not files/wic), so add files/wic
# explicitly. Harmless duplicate on blacksail (already in the default path).
WKS_SEARCH_PATH:append = ":${LAYERDIR}/files/wic"

