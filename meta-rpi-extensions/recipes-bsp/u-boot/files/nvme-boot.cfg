# NVMe boot support for the Raspberry Pi 5 (BCM2712), nvme machine only.
#
# The PCIe driver (CONFIG_PCI_BRCMSTB) and the PCI command are already in
# rpi_arm64_defconfig, and the BCM2712 PCIe binding exists from U-Boot v2026.07
# (the SRC bump in the bbappend). This fragment adds the missing pieces:
#
#   - the NVMe block driver + command, so U-Boot can read the drive
#   - the U-Boot environment relocated onto the NVMe boot FAT. Stock U-Boot puts
#     the env on mmc 0:1 (the SD), which is wrong for an NVMe-only system: the
#     A/B uboot.env must live on the boot medium. The Linux fw_env.config
#     (/boot/uboot.env) already resolves to the NVMe (/boot = nvme0n1p1 on this
#     machine), so both ends then agree.
#   - probe NVMe at preboot so bootstd can find boot.scr on it (stock PREBOOT
#     does "pci enum; usb start;" but never scans nvme).

CONFIG_NVME=y
CONFIG_NVME_PCI=y
CONFIG_CMD_NVME=y

CONFIG_ENV_FAT_INTERFACE="nvme"
CONFIG_ENV_FAT_DEVICE_AND_PART="0:1"

CONFIG_PREBOOT="pci enum; nvme scan; usb start;"

