# NVMe boot support for the Raspberry Pi 5 (BCM2712), nvme machine only.
#
# The PCIe driver (CONFIG_PCI_BRCMSTB) and the PCI command are already in
# rpi_arm64_defconfig, and the BCM2712 PCIe binding exists from U-Boot v2026.07
# (the SRC bump in the bbappend). This fragment adds the missing pieces:
#
#   - the NVMe block driver + command, so U-Boot can read the drive
#   - the U-Boot environment relocated onto the NVMe boot FAT. Stock U-Boot puts
#     the env on mmc 0:1 (the SD), which is wrong for an NVMe-only system: the
#     A/B uboot.env must live on the boot medium. The Linux fw_env.config
#     (/boot/uboot.env) already resolves to the NVMe (/boot = nvme0n1p1 on this
#     machine), so both ends then agree.
#   - probe NVMe at preboot so the device is up before autoboot.
#   - point autoboot directly at our A/B boot.scr on the NVMe boot FAT. The
#     stock default BOOTCOMMAND="bootflow scan" does NOT boot us from NVMe: its
#     global EFI boot manager runs first and tries an EFI loader we don't ship
#     (Boot0000 'nvme 0' -> "Boot failed (err=-14)"), and the per-bootdev script
#     method never runs boot.scr off nvme (the SD/mmc bootdev just spams
#     "Card did not respond to voltage select" when the SD is absent). Replacing
#     bootcmd with an explicit "scan + load + source boot.scr" is deterministic
#     and mirrors the SD path's boot.scr-driven A/B. The Kconfig default is only
#     a default, so setting CONFIG_BOOTCOMMAND here overrides it cleanly. nvme
#     machine only (the SD machine keeps "bootflow scan", which works for it).
#     ${scriptaddr} is expanded by U-Boot at runtime (it lives in the default
#     env); bitbake does not expand it (this .cfg is copied verbatim via SRC_URI).
#     Validated on-device: SD-removed, hands-free boot to login.

CONFIG_NVME=y
CONFIG_NVME_PCI=y
CONFIG_CMD_NVME=y

CONFIG_ENV_FAT_INTERFACE="nvme"
CONFIG_ENV_FAT_DEVICE_AND_PART="0:1"

CONFIG_PREBOOT="pci enum; nvme scan; usb start;"

CONFIG_BOOTCOMMAND="nvme scan; fatload nvme 0:1 ${scriptaddr} boot.scr && source ${scriptaddr}"

