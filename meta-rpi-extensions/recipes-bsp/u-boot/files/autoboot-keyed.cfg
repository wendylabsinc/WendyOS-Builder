# Harden U-Boot autoboot against a floating debug-UART RX on the Raspberry Pi 5.
#
# The RPi5 debug console is the RP1 PL011 UART on GPIO14/15 (dtoverlay=uart0).
# With no debug probe attached that RX pin floats, and electrical noise during
# the CONFIG_BOOTDELAY window is read as console input. With the stock any-key
# abort (CONFIG_AUTOBOOT_KEYED unset) that noise drops the board to the U-Boot
# prompt, so a headless / field RPi5 never boots.
#
# Require a specific stop string instead of any character: line noise cannot
# reproduce the exact sequence, yet a human can still type it to reach U-Boot
# for recovery. (RPi3/4 use the SoC mini-UART, which is biased and does not
# float, so they are unaffected -- this fragment is scoped to :raspberrypi5.)
CONFIG_AUTOBOOT_KEYED=y
CONFIG_AUTOBOOT_STOP_STR="stop"
CONFIG_AUTOBOOT_PROMPT="Autoboot in %d s - type 'stop' to interrupt\n"
