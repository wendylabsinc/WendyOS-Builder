BBPATH:prepend := "${LAYERDIR}:"

BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
    "

BBFILE_COLLECTIONS += "wendyos-x86"
BBFILE_PATTERN_wendyos-x86 := "^${LAYERDIR}/"
BBFILE_PRIORITY_wendyos-x86 = "51"

# Only layered for the generic x86_64 board (see conf/template/include/bblayers/
# x86.inc), so its recipes never reach other boards. Keep the compat set aligned
# with the oe-core tree the x86 board actually builds against — the genericx86-64
# BSP currently resolves under the wrynose tree via WENDYOS_LAYER_TREE. Verify
# before the first build and trim if a single series is settled on.
LAYERSERIES_COMPAT_wendyos-x86 = "scarthgap wrynose blacksail"
LAYERVERSION_wendyos-x86 = "1"
LAYERDEPENDS_wendyos-x86 = "core wendyos"

