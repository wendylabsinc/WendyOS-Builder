# WendyOS x86 A/B trial-boot GRUB config (wendyos-update OTA stack).
#
# Copied verbatim to EFI/BOOT/grub.cfg on the ESP by the wic bootimg_efi plugin
# (referenced as `bootloader --configfile` in genericx86-ab.wks). Mirrors the RPi
# U-Boot boot-ab.cmd.in logic under the same env-var names, so the two boards
# behave identically. The on-device connector (wendyos-update, Phase 2) reads and
# writes the same vars in this ESP grubenv via grub-editenv.
#
# Env-var contract (identical to the U-Boot boot script + the connector):
#   wendyos_boot_slot          0|1  slot to boot (0=rootfsA, 1=rootfsB)
#   wendyos_upgrade_available  0|1  a trial boot is armed
#   bootcount                  0|1  trial attempt counter (bootlimit is 1)
#
# GRUB module note: grubx64.efi here is built with search/ext2/test/loadenv/
# part_gpt but NOT regexp or a savedefault command, so this script uses only
# load_env/save_env/set/test and integer-free {0,1} bootcount logic.

serial --unit=0 --speed=115200 --word=8 --parity=no --stop=1
terminal_input console serial
terminal_output console serial
set timeout=3

# Load the persistent A/B state from this ESP's grubenv (EFI/BOOT/grubenv). A
# missing grubenv on a fresh flash just leaves the vars unset, so the seed block
# below applies the defaults and the first boot always lands on slot A.
load_env

# First-boot seed (idempotent). Stock grubenv has none of our vars.
if [ -z "${wendyos_boot_slot}" ]; then set wendyos_boot_slot=0; fi
if [ -z "${wendyos_upgrade_available}" ]; then set wendyos_upgrade_available=0; fi
if [ -z "${bootcount}" ]; then set bootcount=0; fi

# Trial boot. Only while an update is armed (wendyos_upgrade_available=1, set by
# `wendyos-update install`) do we count. bootlimit is 1, so bootcount is just a
# {0,1} "have we already tried" flag and no arithmetic is needed. The first boot
# of a trial sets bootcount=1. A healthy boot is finalized by
# `wendyos-update commit`, which clears the flag from Linux. If a later boot still
# finds the trial uncommitted, fall back to the other slot (matches the U-Boot
# bootlimit/altbootcmd fallback).
if [ "${wendyos_upgrade_available}" = "1" ]; then
    if [ "${bootcount}" = "0" ]; then
        set bootcount=1
        save_env bootcount
    else
        echo "wendyos: trial slot ${wendyos_boot_slot} did not commit, falling back"
        if [ "${wendyos_boot_slot}" = "0" ]; then
            set wendyos_boot_slot=1
        else
            set wendyos_boot_slot=0
        fi
        set wendyos_upgrade_available=0
        set bootcount=0
        save_env wendyos_boot_slot
        save_env wendyos_upgrade_available
        save_env bootcount
    fi
fi

# Slot -> rootfs partlabel. MUST match genericx86-ab.wks (slot 0 = rootfsA).
if [ "${wendyos_boot_slot}" = "1" ]; then
    set slot_label=rootfsB
else
    set slot_label=rootfsA
fi

# Resolve the slot's device by GPT partlabel, so this boots from whatever disk
# GRUB itself booted from (NVMe, SATA/eMMC or USB) with no fixed /dev name.
search --no-floppy --label --set=slotdev ${slot_label}

echo "wendyos: booting slot ${wendyos_boot_slot} (${slot_label} on ${slotdev})"

set default=0
menuentry "WendyOS (slot ${wendyos_boot_slot})" {
    linux (${slotdev})/boot/bzImage root=PARTLABEL=${slot_label} rw rootwait console=ttyS0,115200 console=tty0
}

# Manual slot overrides, handy from the console (press a key to stop the timeout).
menuentry "WendyOS slot A (rootfsA)" {
    search --no-floppy --label --set=root rootfsA
    linux (${root})/boot/bzImage root=PARTLABEL=rootfsA rw rootwait console=ttyS0,115200 console=tty0
}

menuentry "WendyOS slot B (rootfsB)" {
    search --no-floppy --label --set=root rootfsB
    linux (${root})/boot/bzImage root=PARTLABEL=rootfsB rw rootwait console=ttyS0,115200 console=tty0
}
