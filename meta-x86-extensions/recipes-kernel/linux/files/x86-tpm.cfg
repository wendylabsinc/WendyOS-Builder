# TPM 2.0 support for the x86 /data encryption stack (Phase 1,
# docs/plans/x86-security.md). Built in (=y) rather than modules: the x86 image
# has no initramfs, so building these in removes any module-load-ordering race
# against the /data LUKS unlock and lets the TPM RNG feed early kernel entropy.
# Covers both the Intel PTT firmware TPM (CRB interface) and discrete TPMs
# (TIS LPC/MMIO, and SPI).

CONFIG_TCG_TPM=y
CONFIG_TCG_TIS_CORE=y
CONFIG_TCG_TIS=y
CONFIG_TCG_CRB=y
CONFIG_TCG_TIS_SPI=y

# TPM RNG -> kernel entropy and /dev/hwrng. HW_RANDOM must be =y: a =m disables
# HW_RANDOM_TPM when TCG_TPM is built in.
CONFIG_HW_RANDOM=y
CONFIG_HW_RANDOM_TPM=y

# HMAC + AES-CFB parameter encryption on the TPM command bus (interposer /
# bus-sniffing defense). Kernel 6.18 flipped this default off, so force it on.
# Matters most for a bus-attached discrete TPM.
CONFIG_TCG_TPM2_HMAC=y

# securityfs (/sys/kernel/security) exposes the firmware TPM event log at
# tpm0/binary_bios_measurements (needs CONFIG_EFI, already enabled in the BSP).
CONFIG_SECURITYFS=y
