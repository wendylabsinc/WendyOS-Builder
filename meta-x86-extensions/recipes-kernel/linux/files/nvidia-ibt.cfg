# Disable kernel Indirect Branch Tracking (CET/IBT).
#
# The NVIDIA out-of-tree module's RM core (nv-kernel.o) is compiled without
# ENDBR landing pads, so on an IBT-enabled kernel the first indirect call into
# it raises a control-protection fault (kernel BUG at arch/x86/kernel/cet.c),
# which crash-loops the machine at driver load. Disabling IBT lets the driver
# initialize the GPU. Only pulled in when the NVIDIA dGPU stack is baked in
# (gated in linux-yocto_%.bbappend on WENDYOS_NVIDIA_DGPU).
#
# Follow-up: build the module with ENDBR support so IBT can stay enabled for
# the rest of the kernel.
# CONFIG_X86_KERNEL_IBT is not set
