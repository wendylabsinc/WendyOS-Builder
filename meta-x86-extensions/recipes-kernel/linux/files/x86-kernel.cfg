# General x86 kernel tuning (always applied, all builds).
#
# Use the ORC stack unwinder (the modern x86-64 default) instead of the
# frame-pointer unwinder. The frame-pointer unwinder prints "kernel stack frame
# pointer ... has bad value" warnings when it walks the out-of-tree NVIDIA module
# frames during KFENCE stack-trace samples (seen at GPU init, and intermittently
# at GPU teardown on shutdown). ORC unwinds cleanly through foreign frames without
# those false warnings, and is smaller and faster.
CONFIG_UNWINDER_ORC=y
# CONFIG_UNWINDER_FRAME_POINTER is not set
