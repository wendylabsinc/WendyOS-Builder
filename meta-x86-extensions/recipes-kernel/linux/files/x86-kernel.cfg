# General x86 kernel tuning (always applied, all builds).
#
# Use the ORC stack unwinder (the modern x86-64 default) instead of the
# frame-pointer unwinder. The frame-pointer unwinder prints "kernel stack frame
# pointer ... has bad value" warnings when it walks the out-of-tree NVIDIA module
# frames during KFENCE stack-trace samples (seen at GPU init, and intermittently
# at GPU teardown on shutdown). ORC unwinds cleanly through foreign frames without
# those false warnings, and is smaller and faster.
CONFIG_UNWINDER_ORC=y
# CONFIG_UNWINDER_FRAME_POINTER is not set

# Root-boot essentials, built in (=y), not modules. The x86 image boots the
# kernel directly with no initramfs (GRUB -> linux -> ext4 root), and the A/B
# layout is device-agnostic (the same image boots from NVMe, SATA/eMMC or USB by
# partlabel). With no initramfs to load modules, the controller for whatever disk
# holds the rootfs and the rootfs filesystem itself must be built into the kernel,
# or the root mount fails. SATA/USB/ext4 are already builtin in the generic BSP
# (the current single-rootfs image boots direct), but pin them all so NVMe root in
# particular is guaranteed.
CONFIG_ATA=y
CONFIG_SATA_AHCI=y
CONFIG_BLK_DEV_SD=y
CONFIG_BLK_DEV_NVME=y
CONFIG_USB=y
CONFIG_USB_XHCI_HCD=y
CONFIG_USB_STORAGE=y
CONFIG_EXT4_FS=y
CONFIG_EFI_PARTITION=y
CONFIG_MSDOS_PARTITION=y
