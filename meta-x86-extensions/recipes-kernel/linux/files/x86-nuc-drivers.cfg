# Common x86 mini-PC / NUC network and Bluetooth coverage.
#
# Firmware packages alone are not enough for devices such as Intel AX200/AX210;
# the corresponding kernel modules must also be available in the image.

CONFIG_WLAN=y
CONFIG_CFG80211=m
CONFIG_MAC80211=m

# Intel Wi-Fi 5/6/6E (IWLMVM: AX200/AX210-class) plus Wi-Fi 7 (IWLMLD: the newer
# multi-link driver — a separate Kconfig from IWLMVM). IWLMLD is required for
# BE-series / Panther Lake CNVi parts (e.g. 8086:e340); the in-tree device match
# rows for those live under #if IS_ENABLED(CONFIG_IWLMLD), so without it probe
# fails with -22 ("No config found ... rfid=...") before firmware.
CONFIG_WLAN_VENDOR_INTEL=y
CONFIG_IWLWIFI=m
CONFIG_IWLDVM=m
CONFIG_IWLMVM=m
CONFIG_IWLMLD=m

# Realtek Wi-Fi common in low-cost mini PCs and USB adapters.
CONFIG_WLAN_VENDOR_REALTEK=y
CONFIG_RTW88=m
CONFIG_RTW88_PCI=m
CONFIG_RTW88_USB=m
CONFIG_RTW88_8723D=m
CONFIG_RTW88_8723DE=m
CONFIG_RTW88_8821C=m
CONFIG_RTW88_8821CE=m
CONFIG_RTW88_8822B=m
CONFIG_RTW88_8822BE=m
CONFIG_RTW88_8822C=m
CONFIG_RTW88_8822CE=m
CONFIG_RTW89=m
CONFIG_RTW89_PCI=m
CONFIG_RTW89_8851B=m
CONFIG_RTW89_8851BE=m
CONFIG_RTW89_8852A=m
CONFIG_RTW89_8852AE=m
CONFIG_RTW89_8852B=m
CONFIG_RTW89_8852BE=m
CONFIG_RTW89_8852C=m
CONFIG_RTW89_8852CE=m

# MediaTek Wi-Fi used by many AMD mini PCs and USB adapters.
CONFIG_WLAN_VENDOR_MEDIATEK=y
CONFIG_MT76_CORE=m
CONFIG_MT76_USB=m
CONFIG_MT7921E=m
CONFIG_MT7921U=m

# Qualcomm/Atheros Wi-Fi families.
CONFIG_WLAN_VENDOR_ATH=y
CONFIG_ATH10K=m
CONFIG_ATH10K_PCI=m
CONFIG_ATH11K=m
CONFIG_ATH11K_PCI=m

# Common wired Ethernet and USB Ethernet fallback devices.
CONFIG_E1000E=m
CONFIG_IGB=m
CONFIG_IGC=m
CONFIG_R8169=m
CONFIG_USB_RTL8152=m
CONFIG_USB_NET_AX88179_178A=m
CONFIG_USB_NET_CDCETHER=m

# Integrated and discrete GPU coverage for commodity x86 PCs.
CONFIG_DRM_AMDGPU=m
CONFIG_DRM_AMD_DC=y
CONFIG_DRM_AMD_DC_SI=y
CONFIG_HSA_AMD=y
CONFIG_DRM_RADEON=m
CONFIG_DRM_NOUVEAU=m

# USB-C, USB4, Thunderbolt, and USB4/Thunderbolt host-to-host networking.
CONFIG_TYPEC=m
CONFIG_TYPEC_UCSI=m
CONFIG_UCSI_ACPI=m
CONFIG_USB_ROLE_SWITCH=m
CONFIG_USB4=m
CONFIG_USB4_NET=m

# Bluetooth controllers: USB (btusb, paired with Intel/Realtek/Broadcom/MediaTek
# radios) plus PCIe-attached Intel BT (btintel_pcie) for CNVi platforms such as
# Panther Lake (8086:e376) — the USB BT_INTEL path does not cover it.
CONFIG_BT=m
CONFIG_BT_BREDR=y
CONFIG_BT_LE=y
CONFIG_BT_HCIBTUSB=m
CONFIG_BT_HCIBTUSB_AUTOSUSPEND=y
CONFIG_BT_HCIBTUSB_BCM=y
CONFIG_BT_HCIBTUSB_MTK=y
CONFIG_BT_HCIBTUSB_RTL=y
CONFIG_BT_INTEL=m
CONFIG_BT_INTEL_PCIE=m
CONFIG_BT_RTL=m
CONFIG_BT_BCM=m
CONFIG_BT_MTK=m
