# pstore — persistent kernel-log capture for crashes and shutdown. Records the
# kernel log tail to persistent storage on oops/panic, and (with
# printk.always_kmsg_dump=1 on the cmdline) also at shutdown, readable from
# /sys/fs/pstore on the next boot. The efi-pstore backend stores it in UEFI
# NVRAM, which survives a power cut — so it captures poweroff-time traces that
# netconsole cannot (those fire after the NIC is down, see the
# netconsole/pstore debug howto).
#
# Debug-only: included only in WENDYOS_DEBUG=1 builds (see linux-yocto_%.bbappend).
CONFIG_PSTORE=y
CONFIG_EFI_VARS_PSTORE=y
