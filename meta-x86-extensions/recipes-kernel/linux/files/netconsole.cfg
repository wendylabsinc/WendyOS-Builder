# netconsole — remote kernel-log capture for debugging when no serial/UART is
# available (streams kernel printk over UDP, works from boot through shutdown,
# independent of userspace/journald). See the netconsole/pstore debug howto.
#
# Builtin (=y), NOT a module: a module only loads after userspace, so it cannot
# capture early-boot messages. Builtin can, via a kernel cmdline target.
# NETCONSOLE_DYNAMIC adds runtime target configuration through configfs, so an
# operator can arm or retarget netconsole live with no reboot and no hardcoded
# target baked into the shipped image.
#
# Debug-only: included only in WENDYOS_DEBUG=1 builds (see linux-yocto_%.bbappend).
CONFIG_NETCONSOLE=y
CONFIG_NETCONSOLE_DYNAMIC=y
CONFIG_CONFIGFS_FS=y
