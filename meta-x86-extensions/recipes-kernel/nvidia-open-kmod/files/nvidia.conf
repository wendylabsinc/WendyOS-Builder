# Keep nouveau off the NVIDIA GPU so only the nvidia driver binds the card.
# blacklist stops the udev modalias autoload. The install override also stops
# any explicit or dependency-driven load, which blacklist alone does not.
blacklist nouveau
install nouveau /bin/false

# Enable DRM kernel mode setting on the nvidia modules. Harmless for compute
# and needed if the GPU is ever used for display.
options nvidia-drm modeset=1
