# Wait for the fTPM device before touching the TPM. On Jetson tpm_ftpm_tee is
# loaded late by tee-ftpm-modprobe (after tee-supplicant), so /dev/tpmrm0 shows
# up a few seconds into boot; without this the unlock/enroll ran first and
# failed ("No TPM2 hardware discovered"). udev tags tpmrm devices for systemd
# (99-systemd.rules), so dev-tpmrm0.device is a real unit to wait on. If the
# TPM never appears the device job times out and boot continues without /data
# (crypttab entry is nofail).
[Unit]
Wants=dev-tpmrm0.device
After=dev-tpmrm0.device

