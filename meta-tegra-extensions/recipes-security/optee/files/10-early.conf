# Start early (before local-fs), not after basic.target: the /data unlock
# (systemd-cryptsetup@data, pulled in by data.mount) needs /dev/tpmrm0, which
# only appears after tee-supplicant + tee-ftpm-modprobe have run. With the
# stock ordering that is a deadlock: data.mount is part of local-fs.target
# while these services wait for basic.target, which waits for local-fs.
# Needs only udev (for /dev/teepriv0, created by the built-in OP-TEE driver)
# and a writable rootfs (/var/lib/tee).
[Unit]
DefaultDependencies=no
After=systemd-udevd.service systemd-remount-fs.service
Conflicts=shutdown.target
Before=shutdown.target

