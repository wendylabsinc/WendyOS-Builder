# Keep udev's coldplug from autoloading tpm_ftpm_tee via its DT modalias in
# early boot. The fTPM TA keeps its NV through tee-supplicant (REE-FS); if the
# kernel driver opens the TA session before the supplicant is up, the fTPM
# silently runs from RAM and every sealed key dies at reboot. blacklist only
# blocks alias-based autoload -- tee-ftpm-modprobe.service still loads the
# module by name (modprobe --ignore-install), after tee-supplicant.
blacklist tpm_ftpm_tee

