BBPATH:prepend := "${LAYERDIR}:"

BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
    "

BBFILE_COLLECTIONS += "wendyos-tegra-jp7"
BBFILE_PATTERN_wendyos-tegra-jp7 := "^${LAYERDIR}/"
BBFILE_PRIORITY_wendyos-tegra-jp7 = "52"

LAYERSERIES_COMPAT_wendyos-tegra-jp7 = "wrynose blacksail"
LAYERVERSION_wendyos-tegra-jp7 = "1"
LAYERDEPENDS_wendyos-tegra-jp7 = "core wendyos wendyos-tegra"

# This layer carries only bbappends and their files dirs; no .bb recipes.
# Suppress the empty-collection warning.
BBFILE_PATTERN_IGNORE_EMPTY_wendyos-tegra-jp7 = "1"
