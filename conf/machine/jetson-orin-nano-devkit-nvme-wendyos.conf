
# jetson-orin-nano-devkit-nvme-wendyos.conf
# NVMe boot configuration for Jetson Orin Nano DevKit

MACHINEOVERRIDES =. "jetson-orin-nano-devkit:"

# include upstream base if available
require conf/machine/jetson-orin-nano-devkit-nvme.conf

# AB upgrades & bootloader choices (board-specific)
UBOOT_EXTLINUX = "1"
USE_REDUNDANT_FLASH_LAYOUT_DEFAULT = "1"

# --- OS-managed A/B via GRUB2 (grubaa64.efi on the ESP + BootOrder) ---------
# Orin's NVIDIA firmware rootfs redundancy (RootfsRedundancyLevel) cannot be
# armed from the OS (efivar writes EINVAL), so nvbootctrl slot switches no-op.
# On this path a GRUB2 UEFI app enrolled FIRST in BootOrder (L4TLauncher kept as
# fallback) owns A/B slot selection from an OS-writable grubenv on the ESP FAT,
# and the wendyos-update `grubenv` connector drives it. Turning this knob on
# wires the GRUB stack into the image (see tegra-image.inc) and drops the
# unarmable tegra-rootfs-redundancy service (see packagegroup-wendyos-tegra.bb).
WENDYOS_TEGRA_GRUB_AB = "1"

# grub-efi (oe-core) build tuning for the A/B grubaa64.efi. GRUB_BUILDIN embeds
# the modules the A/B grub.cfg needs so the EFI app is self-contained on the FAT
# ESP (no external module load): filesystem (ext2/fat), GPT + label search,
# linux loader, GOP console, and the loadenv/configfile/scripting primitives the
# grubenv trial logic uses. EFIDIR is the grub-mkimage prefix AND the ESP subdir
# GRUB looks in for grub.cfg + grubenv — pinned to /EFI/wendyos so it matches
# where the first-boot service stages the files. These are global (config-scope)
# so the grub-efi recipe itself sees them.
EFI_PROVIDER = "grub-efi"
EFIDIR = "/EFI/wendyos"
GRUB_BUILDIN += "ext2 fat part_gpt search search_label linux efi_gop configfile echo test loadenv normal boot"

MENDER_FEATURES_DISABLE:append = " mender-uboot"
MENDER_EFI_LOADER = ""

# UEFI Capsule Update Configuration
# Disable Secure Boot for development/testing (no signing keys configured)
# When "false": No key enrollment, Secure Boot disabled, unsigned capsules accepted
# Set to "true" for production after implementing proper signing infrastructure
TEGRA_UEFI_USE_SIGNED_FILES = "false"

# NVMe Storage geometry (board-specific)
# Set flash image size to 64GB (automatically sets MENDER_STORAGE_TOTAL_SIZE_MB = 51000)
WENDYOS_FLASH_IMAGE_SIZE ?= "64GB"
MENDER_STORAGE_DEVICE_BASE = "/dev/nvme0n1p"
MENDER_BOOT_PART = "${MENDER_STORAGE_DEVICE_BASE}11"
MENDER_ROOTFS_PART_A = "${MENDER_STORAGE_DEVICE_BASE}1"
MENDER_ROOTFS_PART_B = "${MENDER_STORAGE_DEVICE_BASE}2"

# IMPORTANT: Use partition 17 for Mender data, NOT partition 15 (UDA)
# UDA (p15) is reserved by NVIDIA and positioned before rootfs partitions,
# preventing expansion. Partition 17 (mender_data, renamed from permanet_user_storage)
# is positioned AFTER APP_b and can expand to fill remaining disk space.
MENDER_DATA_PART_NUMBER = "17"
MENDER_DATA_PART = "${MENDER_STORAGE_DEVICE_BASE}${MENDER_DATA_PART_NUMBER}"

# Initial size - will auto-expand on first boot via mender-grow-data.service
MENDER_DATA_PART_SIZE_MB = "512"

# NVMe boot device configuration
TNSPEC_BOOTDEV = "nvme0n1p1"

# Use NVMe partition layout
PARTITION_LAYOUT_TEMPLATE_DEFAULT = "flash_t234_qspi.xml"
PARTITION_LAYOUT_TEMPLATE_DEFAULT_SUPPORTS_REDUNDANT = "1"
PARTITION_LAYOUT_EXTERNAL_DEFAULT = "flash_l4t_t234_nvme.xml"

# Jetson image format is OTA-stack dependent (we maintain both Mender and
# wendyos-update as a switchable capability via WENDYOS_OTA):
#   wendy (JP7.2/blacksail): a single flashable tegraflash-tar (the r38+
#     IMAGE_TYPE rename, as on Thor) — mender-full is not inherited, so its
#     "mender"/"dataimg" types have no IMAGE_CMD and MUST be dropped.
#   mender (JP6/scarthgap): the original tegraflash + mender + dataimg.
# Lazy ${@} reads the FINAL WENDYOS_OTA (machine conf parses after local.conf).
# The MENDER_* vars above are inert when mender-full isn't inherited.
IMAGE_FSTYPES:tegra = "${@'tegraflash-tar' if (d.getVar('WENDYOS_OTA') or '') == 'wendy' else 'tegraflash mender dataimg'}"

# blacksail oe-core defaults IMAGE_NAME_SUFFIX to ".rootfs", which would push
# ".rootfs" into deployed artifact/symlink names; the publisher + CI expect
# none (matching scarthgap). Drop it on the wendy path; keep the default
# otherwise.
IMAGE_NAME_SUFFIX = "${@'' if (d.getVar('WENDYOS_OTA') or '') == 'wendy' else '.rootfs'}"
IMAGE_FSTYPES:pn-tegra-minimal-initramfs:tegra = "${INITRAMFS_FSTYPES}"
IMAGE_FSTYPES:pn-tegra-initrd-flash-initramfs:tegra = "${TEGRA_INITRD_FLASH_INITRAMFS_FSTYPES}"

# If you really need it, board param (but consider removing if unused):
EMMC_SIZE = "0"

# Root filesystem image size (MB). Overrides the 8192 (8GB) default from
# recipes-core/images/wendyos-image.bb. flash-image-sizes.inc sizes the
# device and Mender storage total, but NOT the rootfs filesystem, so without
# this the rootfs stays at 8GB even though the A/B slots are ~24GB on the 64GB
# layout. 16GB gives headroom for the NVIDIA CUDA/TensorRT/DeepStream stack as
# more features land.
IMAGE_ROOTFS_SIZE = "16384"

# Stable board identity written to /etc/wendyos/device-type
WENDYOS_BOARD_ID = "jetson-orin-nano"
