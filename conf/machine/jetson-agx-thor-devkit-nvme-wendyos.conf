
# jetson-agx-thor-devkit-nvme-wendyos.conf
# NVMe boot configuration for Jetson AGX Thor DevKit (P3834-0008 module on
# P4071-0000 carrier). Tegra264 / SOC_FAMILY = "tegra264", JetPack 7.1 /
# L4T 38.4.0. Phase 1 (no Mender, no OTA).
MACHINEOVERRIDES =. "jetson-agx-thor-devkit:"

# Inherit from upstream meta-tegra Thor DevKit machine config
# (P3834-0008 module on P4071-0000 carrier). Pulls in
# conf/machine/include/tegra264.inc which sets SOC_FAMILY = "tegra264",
# console = ttyUTC0 @ 115200, T264 boot firmware list, hafnium provider,
# and TEGRA_EDK2_PLATFORM = "t26x".
require conf/machine/jetson-agx-thor-devkit.conf

# Use NVIDIA prebuilt UEFI firmware (defensive, mirrors AGX Orin practice).
# The source-built edk2-firmware-tegra recipe
# for T264 has not been validated end-to-end on Thor yet.
PREFERRED_PROVIDER_virtual/bootloader = "tegra-uefi-prebuilt"

# Bootloader choice: extlinux (matches Orin family).
UBOOT_EXTLINUX = "1"

# Mender vars are intentionally absent — OTA on Thor arrives with
# wendyos-update, not Mender (docs/plans/wendy-ota-update.md).

# Rootfs A/B redundancy via upstream meta-tegra machinery
# (conf/machine/include/tegra-common.inc on r38):
#   - pulls L4TConfiguration-RootfsRedundancyLevelABEnable.dtbo into
#     TEGRA_BOOTCONTROL_OVERLAYS,
#   - switches PARTITION_LAYOUT_EXTERNAL to the auto-derived
#     flash_l4t_t264_nvme_rootfs_ab.xml,
#   - halves ROOTFSPART_SIZE for the two slots.
# Whether the r38 BSP ships the t264 _rootfs_ab.xml, and whether GPT ids
# 16/17 are free for config/wendy_data in the t264 layout, is verified at
# first build (wendy-ota-update.md Phase 1).
USE_REDUNDANT_FLASH_LAYOUT_DEFAULT = "1"

# Per-slot A/B rootfs size = 12 GiB (Jetson Series target). On this
# WENDYOS_OTA = "none" path only tegra-common.inc assigns ROOTFSPART_SIZE (weak
# ?=), so this hard = wins. NOTE: if Thor moves to WENDYOS_OTA = "mender",
# tegra-mender-setup re-derives ROOTFSPART_SIZE from MENDER_STORAGE_TOTAL_SIZE_MB
# and overrides this pin — set the size there instead. Frozen at flash (no OTA
# resize), so it must be right here.
# TODO(thor-bringup): confirm this survives the r38 t264 auto-derived _rootfs_ab.xml.
ROOTFSPART_SIZE = "${@12 * 1024 ** 3}"  # 12 GiB (= 12884901888 bytes)

# UEFI Capsule Update Configuration
# Disable Secure Boot for development/testing (no signing keys configured).
# Set to "true" for production after implementing proper signing
# infrastructure.
TEGRA_UEFI_USE_SIGNED_FILES = "false"

# wrynose oe-core (image-artifact-names.bbclass) defaults IMAGE_NAME_SUFFIX to
# ".rootfs", which would make IMAGE_LINK_NAME include ".rootfs" and produce
# deployed symlinks like wendyos-image-${MACHINE}.rootfs.tegraflash-tar.
# The publisher and CI scripts expect no suffix, matching scarthgap behaviour.
IMAGE_NAME_SUFFIX = ""

# Image formats: produces a one-shot flashable image only.
# 'mender' and 'dataimg' are deliberately omitted — no Mender; the
# wendy_data partition is allocated empty at flash time (no .dataimg) and
# the wendyos-update artifact (.wup) arrives in a later phase.
# On r38.4.x the IMAGE_TYPE was renamed: tegraflash → tegraflash-tar
# (verified via OE4T/meta-tegra master-l4t-r38.4.x:
#   classes-recipe/image_types_tegra.bbclass:7  IMAGE_TYPES += "tegraflash-tar"
#   conf/machine/include/tegra-common.inc:68    IMAGE_FSTYPES += "tegraflash-tar.zst"
# ).
IMAGE_FSTYPES:tegra = "tegraflash-tar"
IMAGE_FSTYPES:pn-tegra-minimal-initramfs:tegra = "${INITRAMFS_FSTYPES}"
IMAGE_FSTYPES:pn-tegra-initrd-flash-initramfs:tegra = "${TEGRA_INITRD_FLASH_INITRAMFS_FSTYPES}"

# Minimum rootfs size, in KiB — get_rootfs_size() in oe-core image.bbclass
# compares this against du(rootfs)/1024 (KiB), and oe_mkext234fs writes the image
# with `dd ... bs=1024`. This raises the wendyos-image.bb default of 8192 KiB
# (8 MiB) to 16384 KiB (16 MiB). Both are floors far below the real content, so
# the rootfs is effectively content-sized (du * IMAGE_OVERHEAD_FACTOR dominates);
# this does NOT pin a fixed image size. Thor runs the wendyos-update OTA stack
# (WENDYOS_OTA = "wendy"), not Mender, so the Mender flash-image-sizes.inc path
# does not apply. The two A/B rootfs slots are sized from the rootfs image by the
# auto-derived redundant layout.
IMAGE_ROOTFS_SIZE = "16384"

# Round the rootfs ext4 image up to a 128 MiB (== 32768 4K-block) multiple so
# blocks_per_group is always 32768. NVIDIA's UEFI ext4 reader (EDK2 Ext4Pkg
# Ext4Dxe, Superblock.c) rejects any filesystem with blocks_per_group !=
# 8*blocksize (32768 for 4K blocks) with EFI_UNSUPPORTED, so L4TLauncher then
# cannot read /boot/extlinux/extlinux.conf and the board boot-loops. The rootfs
# is content-sized (IMAGE_ROOTFS_SIZE above is only a ~16 MiB floor, so du x
# IMAGE_OVERHEAD_FACTOR wins), and its block count occasionally lands just past a
# 32768-block boundary, where mke2fs shrinks blocks_per_group (runt-group
# avoidance, e.g. to 32736) even if "-g 32768" is passed. Aligning the image size
# up to a 32768-block multiple leaves a full final group, so mke2fs keeps 32768.
# Scoped to pn-wendyos-image only: a machine-wide alignment also rounds the ESP
# image (tegra-espimage) up past its 64 MiB IMAGE_ROOTFS_MAXSIZE and fails the
# build. IMAGE_ROOTFS_ALIGNMENT (KiB) also feeds TEGRA_BLBLOCKSIZE, so pin the
# latter (for this image) to its current 4 KiB value so mksparse / the flash
# helper are unchanged.
IMAGE_ROOTFS_ALIGNMENT:pn-wendyos-image = "131072"
TEGRA_BLBLOCKSIZE:pn-wendyos-image = "4096"

# Stable board identity written to /etc/wendyos/device-type
WENDYOS_BOARD_ID = "jetson-agx-thor"
