
# jetson-agx-thor-devkit-nvme-wendyos.conf
# NVMe boot configuration for Jetson AGX Thor DevKit (P3834-0008 module on
# P4071-0000 carrier). Tegra264 / SOC_FAMILY = "tegra264", JetPack 7.1 /
# L4T 38.4.0. Phase 1 (no Mender, no OTA).
MACHINEOVERRIDES =. "jetson-agx-thor-devkit:"

# Inherit from upstream meta-tegra Thor DevKit machine config
# (P3834-0008 module on P4071-0000 carrier). Pulls in
# conf/machine/include/tegra264.inc which sets SOC_FAMILY = "tegra264",
# console = ttyUTC0 @ 115200, T264 boot firmware list, hafnium provider,
# and TEGRA_EDK2_PLATFORM = "t26x".
require conf/machine/jetson-agx-thor-devkit.conf

# Use NVIDIA prebuilt UEFI firmware (defensive, mirrors AGX Orin practice).
# The source-built edk2-firmware-tegra recipe
# for T264 has not been validated end-to-end on Thor yet.
PREFERRED_PROVIDER_virtual/bootloader = "tegra-uefi-prebuilt"

# Bootloader choice: extlinux (matches Orin family).
UBOOT_EXTLINUX = "1"

# Mender / Mender capsule update vars are intentionally absent — Mender on
# Thor is deferred. When that phase reopens, this conf
# gains MENDER_STORAGE_DEVICE_BASE / MENDER_BOOT_PART / MENDER_ROOTFS_PART_*
# / MENDER_DATA_PART_* alongside USE_REDUNDANT_FLASH_LAYOUT_DEFAULT and the
# capsule signing config below.

# UEFI Capsule Update Configuration
# Disable Secure Boot for development/testing (no signing keys configured).
# Set to "true" for production after implementing proper signing
# infrastructure.
TEGRA_UEFI_USE_SIGNED_FILES = "false"

# Image formats: produces a one-shot flashable image only.
# 'mender' and 'dataimg' are deliberately omitted (no A/B, no /data
# partition layout) — those return when B2 reopens.
# On r38.4.x the IMAGE_TYPE was renamed: tegraflash → tegraflash-tar
# (verified via OE4T/meta-tegra master-l4t-r38.4.x:
#   classes-recipe/image_types_tegra.bbclass:7  IMAGE_TYPES += "tegraflash-tar"
#   conf/machine/include/tegra-common.inc:68    IMAGE_FSTYPES += "tegraflash-tar.zst"
# ).
IMAGE_FSTYPES:tegra = "tegraflash-tar"
IMAGE_FSTYPES:pn-tegra-minimal-initramfs:tegra = "${INITRAMFS_FSTYPES}"
IMAGE_FSTYPES:pn-tegra-initrd-flash-initramfs:tegra = "${TEGRA_INITRD_FLASH_INITRAMFS_FSTYPES}"

# Stable board identity written to /etc/wendyos/device-type
WENDYOS_BOARD_ID = "jetson-agx-thor"
