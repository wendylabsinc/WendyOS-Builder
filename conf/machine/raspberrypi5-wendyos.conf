MACHINEOVERRIDES =. "rpi:raspberrypi5:"
require conf/machine/raspberrypi5.conf
require conf/machine/include/raspberrypi-common-wendyos.inc

# --- wendyos-update A/B OTA stack (replaces Mender on RPi5) ----------------
# Set AFTER the common include (which defaults WENDYOS_OTA="mender" for the
# RPi3/4/5 family) so RPi5 moves to the wendy stack while RPi3/4 stay on
# Mender. The rpi5-sd/rpi5-nvme board templates drop the Mender layers from
# BBLAYERS (bblayers/rpi-wendy.inc); the rest of the wendy wiring keys off
# WENDYOS_OTA == "wendy" (wendyos.conf requires wendyos-update.inc; the RPi
# fstab/cmdline/boot-script/data bits gate on it too).
WENDYOS_OTA = "wendy"

# No Mender -> nothing generates the sdimg; build our hand-authored A/B layout
# via wic. IMAGE_FSTYPES gains the flashable wic (.wendy is added for the
# product image by wendyos-update.inc; ext4 by wendyos-image.bb for packing).
WKS_FILE = "rpi-wendy-ab.wks"
IMAGE_FSTYPES:append = " wic"

# RPi5 has a dedicated USB-C peripheral controller (BCM2712 dwc2 at
# /sys/class/udc/1000480000.usb, separate from the RP1 xHCI host ports
# on USB-A). Enable gadget by default. See
# meta-rpi-extensions/recipes-bsp/bootfiles/rpi-cmdline.bbappend and
# the BCM2712 g_dma=false kernel patch for the full RPi5 gadget story.
WENDYOS_USB_GADGET ?= "1"

# RPi5 boot config (consumed by rpi-config_%.bbappend):
# - dtparam=pciex1: enable the PCIe x1 lane in the kernel device tree.
#   Required for the kernel to access the NVMe drive (e.g. when booting
#   from SD and flashing the NVMe over SSH, or any data-only NVMe use).
# - camera_auto_detect=1: probe an official CSI camera (IMX219/IMX477/
#   IMX708) on either CAM connector at boot, mirroring stock Raspberry Pi
#   OS. The sensor overlay is loaded from the camera's on-board EEPROM, so
#   no hardcoded dtoverlay is needed. A ribbon without an EEPROM instead
#   needs an explicit overlay, e.g. append "dtoverlay=imx477,cam1\n".
#   Pairs with the libcamera stack (libcamera + libcamerasrc + the PiSP
#   pipeline) pulled in by packagegroup-wendyos-rpi and the
#   meta-rpi-extensions libcamera bbappend.
RPI_EXTRA_CONFIG = "dtparam=pciex1\ncamera_auto_detect=1\n"

# PL011 is mapped to GPIO 14/15 via dtoverlay=uart0 (see
# meta-rpi-extensions/recipes-bsp/bootfiles/rpi-config_%.bbappend) so the
# serial console lands on ttyAMA0, not the mini UART.
SERIAL_CONSOLES = "115200;ttyAMA0"

MACHINE_FEATURES:append = " wifi bluetooth usbgadget"

# Stable board identity written to /etc/wendyos/device-type
WENDYOS_BOARD_ID = "raspberry-pi-5"
