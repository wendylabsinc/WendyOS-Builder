#@TYPE: Machine
#@NAME: Generic x86_64 WendyOS PC
#@DESCRIPTION: Experimental WendyOS target for generic Intel/AMD x86_64 PCs.

# Reuse the upstream Yocto reference BSP while exposing Wendy-specific
# overrides for distro/image includes.
MACHINEOVERRIDES =. "x86-wendyos:genericx86-64:"
require conf/machine/genericx86-64.conf

# MVP image formats: a directly flashable UEFI/BIOS .wic disk image plus
# tarball output for inspection and SDK workflows. wendyos-image.bb appends
# ext4 globally.
IMAGE_FSTYPES = "wic wic.bmap tar.bz2"

# A/B disk layout (GRUB-EFI + grubenv). The device-agnostic A/B wks (ESP + config
# + rootfsA/rootfsB fixed-size + data) boots from NVMe, SATA/eMMC or USB by label.
# See meta-x86-extensions/files/wic/genericx86-ab.wks + grubAB.cfg and
# docs/plans/x86-ota-plan.md.
WKS_FILE = "genericx86-ab.wks"

# OTA phasing (docs/plans/x86-ota-plan.md): Phase 1 lays down the A/B layout + the
# GRUB A/B boot chain but keeps WENDYOS_OTA="none" (no update agent yet), so the
# boot chain is proven first by manually flipping the grubenv slot. Phase 2 flips
# this to "wendy" (pulls wendyos-update) and adds the x86 grubenv connector.
# WENDYOS_OTA is the gate (wendyos.conf defaults it to "mender" for any
# non-qemu/rpi/tegra machine), so it must be pinned here — WENDYOS_MENDER is not
# the selector.
WENDYOS_OTA = "none"
WENDYOS_UPDATE_BOOTLOADER = "0"
WENDYOS_EFI_DEBUG = "0"
WENDYOS_DEEPSTREAM = "0"
WENDYOS_USB_GADGET = "0"
WENDYOS_PERSIST_JOURNAL_LOGS = "0"
WENDYOS_NVIDIA_DGPU ??= "1"

MACHINE_FEATURES:append = " alsa bluetooth usbhost vfat ext2 screen pci"

# Stable board identity written to /etc/wendyos/device-type
WENDYOS_BOARD_ID = "generic-x86-64"

# Show the GRUB boot menu on the attached monitor and keyboard, not only the
# serial port. The OE default emits just a `serial` line with no terminal
# selection, so force terminal_input/output to both console and serial. This
# lets the kernel cmdline be edited from the console (press `e`). The longer
# timeout gives time to catch the menu.
GRUB_OPTS = "serial --unit=0 --speed=115200 --word=8 --parity=no --stop=1;terminal_input console serial;terminal_output console serial"
GRUB_TIMEOUT = "10"
