#@TYPE: Machine
#@NAME: Generic x86_64 WendyOS PC
#@DESCRIPTION: Experimental WendyOS target for generic Intel/AMD x86_64 PCs.

# Reuse the upstream Yocto reference BSP while exposing Wendy-specific
# overrides for distro/image includes.
MACHINEOVERRIDES =. "x86-wendyos:genericx86-64:"
require conf/machine/genericx86-64.conf

# MVP image formats: a directly flashable UEFI/BIOS .wic disk image plus
# tarball output for inspection and SDK workflows. wendyos-image.bb appends
# ext4 globally.
IMAGE_FSTYPES = "wic wic.bmap tar.bz2"

# No A/B OTA or bootloader update flow yet. Desktop-class PCs need a separate
# Mender/GRUB design before enabling this safely.
WENDYOS_MENDER = "0"
WENDYOS_UPDATE_BOOTLOADER = "0"
WENDYOS_EFI_DEBUG = "0"
WENDYOS_DEEPSTREAM = "0"
WENDYOS_USB_GADGET = "0"
WENDYOS_PERSIST_JOURNAL_LOGS = "0"
WENDYOS_NVIDIA_DGPU ??= "1"

MACHINE_FEATURES:append = " alsa bluetooth usbhost vfat ext2 screen pci"

# Stable board identity written to /etc/wendyos/device-type
WENDYOS_BOARD_ID = "generic-x86-64"
