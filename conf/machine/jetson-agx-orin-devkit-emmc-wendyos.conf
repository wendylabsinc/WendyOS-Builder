
# jetson-agx-orin-devkit-emmc-wendyos.conf
# eMMC boot configuration for Jetson AGX Orin DevKit (P3701-0005, 64GB module).
#
# This variant boots and writes WendyOS to the onboard 64GB eMMC instead of
# an external NVMe SSD. Flashing this image WILL OVERWRITE the factory NVIDIA
# JetPack image that ships on the eMMC of a new DevKit.

MACHINEOVERRIDES =. "jetson-agx-orin-devkit:"

# Inherit from upstream 64GB AGX Orin config (P3701-0005, SKU 0005)
# This sets TEGRA_BOARDSKU, KERNEL_DEVICETREE, BPMP DTB, PMIC, and SDRAM configs
# for the 64GB module variant
require conf/machine/p3737-0000-p3701-0005.conf

# Use NVIDIA prebuilt UEFI firmware for AGX Orin.
# Source-built edk2-firmware-tegra causes a boot loop on this platform.
# See docs/agx-orin-edk2-boot-loop.md for symptom details, pinned versions
# at the time the workaround was required, and the re-test checklist.
# (The same SoC and firmware path are used regardless of NVMe vs eMMC boot.)
PREFERRED_PROVIDER_virtual/bootloader = "tegra-uefi-prebuilt"

# AB upgrades & bootloader choices (board-specific)
UBOOT_EXTLINUX = "1"
USE_REDUNDANT_FLASH_LAYOUT_DEFAULT = "1"

MENDER_FEATURES_DISABLE:append = " mender-uboot"
MENDER_EFI_LOADER = ""

# UEFI Capsule Update Configuration
# Disable Secure Boot for development/testing (no signing keys configured)
# When "false": No key enrollment, Secure Boot disabled, unsigned capsules accepted
# Set to "true" for production after implementing proper signing infrastructure
TEGRA_UEFI_USE_SIGNED_FILES = "false"

# eMMC storage geometry (board-specific)
# Hard `=` (P3701-0005 module ships only with 64GB eMMC; no other valid size).
# WENDYOS_FLASH_IMAGE_SIZE = "64GB" yields MENDER_STORAGE_TOTAL_SIZE_MB = 51000
# (~49.8 GiB). The 64GB eMMC has ~59.28 GiB usable after vendor reserve, so the
# A/B layout fits with ~9 GiB headroom for the config + mender_data partitions.
WENDYOS_FLASH_IMAGE_SIZE = "64GB"
MENDER_STORAGE_DEVICE_BASE = "/dev/mmcblk0p"
MENDER_BOOT_PART = "${MENDER_STORAGE_DEVICE_BASE}11"
MENDER_ROOTFS_PART_A = "${MENDER_STORAGE_DEVICE_BASE}1"
MENDER_ROOTFS_PART_B = "${MENDER_STORAGE_DEVICE_BASE}2"

# IMPORTANT: Use partition 17 for Mender data, NOT partition 15 (UDA)
# UDA (p15) is reserved by NVIDIA and positioned before rootfs partitions,
# preventing expansion. Partition 17 (mender_data, renamed from permanet_user_storage)
# is positioned AFTER APP_b and can expand to fill remaining disk space.
# tegra_partition_config.bbclass (lines 310-319) iterates over ['sdcard',
# 'sdmmc_user'] device types in the template XML, so the eMMC layout is
# normalised to the same on-disk GPT (config p16 + mender_data p17) as NVMe.
MENDER_DATA_PART_NUMBER = "17"
MENDER_DATA_PART = "${MENDER_STORAGE_DEVICE_BASE}${MENDER_DATA_PART_NUMBER}"

# Initial size - will auto-expand on first boot via mender-grow-data.service
MENDER_DATA_PART_SIZE_MB = "512"

# BUP (Bootloader Update Payload) must not reference data partition images.
# For sdmmc_user-based machines the config and mender_data partitions live in
# the same XML that BUP processes, so without this strip BUP fails at payload
# generation looking for config-partition.fat32.img. Same pattern as the
# Nano-SD variant; not needed on NVMe variants where these partitions are in
# the EXTERNAL XML which BUP does not read.
TEGRA_BUPGEN_STRIP_IMG_NAMES:append = " config-partition.fat32.img"

# eMMC boot device configuration (mmcblk0 = onboard eMMC on AGX; mmcblk1 = SD slot).
TNSPEC_BOOTDEV = "mmcblk0p1"

# Partition layout: QSPI for the boot chain + eMMC user area for rootfs A/B.
# This matches agx-orin.inc's upstream default and contrasts with the NVMe
# variant which uses flash_t234_qspi.xml + flash_l4t_t234_nvme.xml.
#
# Do NOT set PARTITION_LAYOUT_TEMPLATE_DEFAULT_SUPPORTS_REDUNDANT here. The
# bare flash_t234_qspi_sdmmc.xml in the BSP tarball has only APP (no APP_b),
# so we must let tegra-common.inc:140 auto-substitute to the
# flash_t234_qspi_sdmmc_rootfs_ab.xml variant which has both APP and APP_b.
# The WendyOS bbclass (tegra_partition_config.bbclass:312) then adds config
# (p16) and mender_data (p17) on top of the A/B template.
PARTITION_LAYOUT_TEMPLATE_DEFAULT = "flash_t234_qspi_sdmmc.xml"

# Suppress NVMe external XML processing for this internal-eMMC machine.
# tegra234.inc inherits PARTITION_LAYOUT_EXTERNAL_DEFAULT = "flash_l4t_t234_nvme.xml";
# the empty override stops tegra-storage-layout from generating an unused
# external-flash.xml and prevents accidental "doexternal.sh against NVMe"
# usage with an eMMC-targeted image.
PARTITION_LAYOUT_EXTERNAL_DEFAULT = ""

# Jetson image formats that are machine/BSP oriented:
IMAGE_FSTYPES:tegra = "tegraflash mender dataimg"
IMAGE_FSTYPES:pn-tegra-minimal-initramfs:tegra = "${INITRAMFS_FSTYPES}"
IMAGE_FSTYPES:pn-tegra-initrd-flash-initramfs:tegra = "${TEGRA_INITRD_FLASH_INITRAMFS_FSTYPES}"

# 64GB eMMC capacity in bytes (P3701-0005). Upstream agx-orin.inc:7 defaults to
# 31276924928 (32GB module value) and p3737-0000-p3701-0005.conf does not
# override it, so we must set it here. Value sourced from
# repos/meta-tegra/conf/machine/jetson-agx-orin-devkit-industrial.conf:9
# (P3701-0008, the Industrial 64GB SKU which uses the same eMMC class).
EMMC_SIZE = "63652757504"

# Root filesystem image size (MB). Overrides the 8192 (8GB) default from
# recipes-core/images/wendyos-image.bb. flash-image-sizes.inc sizes the
# device and Mender storage total, but NOT the rootfs filesystem, so without
# this the rootfs stays at 8GB even though the A/B slots are ~24GB on the 64GB
# layout (~49.8 GiB Mender storage, see headroom note above). 16GB gives room
# for the NVIDIA CUDA/TensorRT/DeepStream stack as more features land.
IMAGE_ROOTFS_SIZE = "16384"

# Stable board identity written to /etc/wendyos/device-type
WENDYOS_BOARD_ID = "jetson-agx-orin-emmc"
