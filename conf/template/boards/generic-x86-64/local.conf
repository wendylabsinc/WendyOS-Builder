# generic-x86-64: generic UEFI/BIOS x86_64 PC image (blacksail tree).

require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/common.inc
require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/x86.inc

# blacksail bring-up: bridge LAYERSERIES_COMPAT for meta-oe/meta-virt (not yet
# declaring blacksail upstream). Gated on WENDYOS_LAYER_TREE=="blacksail", inert
# on other trees.
require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/blacksail-compat.inc

DEVICE  = "generic-x86-64"
STORAGE = "disk"
MACHINE = "genericx86-64-wendyos"

# Size is in KB. Default: 8 GiB root filesystem for the .wic disk image.
WENDYOS_X86_ROOTFS_SIZE = "8388608"
