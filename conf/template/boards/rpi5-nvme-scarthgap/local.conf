# rpi5-nvme-scarthgap: LEGACY Raspberry Pi 5 (NVMe) on the scarthgap tree.
# Fallback during the blacksail migration — the canonical board is now rpi5-nvme
# (blacksail). DELETE this once all RPi boards are migrated to blacksail.
# NOTE: U-Boot here is 2025.04 (meta-lts-mixins), which has no BCM2712 PCIe
# driver, so NVMe-over-U-Boot does NOT work on this board — SD-era fallback only.

require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/common.inc
require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/usb-gadget.inc
require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/rpi.inc

DEVICE  = "raspberry-pi-5"
STORAGE = "nvme"
MACHINE = "raspberrypi5-nvme-wendyos"
