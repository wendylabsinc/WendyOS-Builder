# jetson-agx-orin-emmc: NVIDIA Jetson AGX Orin Developer Kit (eMMC)

require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/common.inc
require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/usb-gadget.inc
require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/tegra-t234.inc

# blacksail bring-up: bridge meta-oe/meta-virt LAYERSERIES_COMPAT until
# upstream declares blacksail. Inert on non-blacksail trees.
require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/blacksail-compat.inc

# DEVICE is the OTA manifest key (shared with the NVMe variant, which is
# published under the same key with --storage nvme). STORAGE selects the
# eMMC artifact and is written to /etc/wendyos/device-type so the OTA client
# does not have to infer the medium from the machine name.
DEVICE  = "jetson-agx-orin"
STORAGE = "emmc"
MACHINE = "jetson-agx-orin-devkit-emmc-wendyos"

# Rootfs sizing is fixed at 12 GiB by conf/distro/include/wendyos-rootfs-size.inc
# (image == A/B slot == .wendy OTA payload; docs/plans/fixed-rootfs-sizes.md).
