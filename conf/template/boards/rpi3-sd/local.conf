# rpi3-sd: Raspberry Pi 3 B/B+ (64-bit) booting from SD card (blacksail tree).
# wendyos-update OTA, no meta-lts-mixins. See repos.overrides for the
# blacksail pin rationale. The legacy scarthgap board is rpi3-sd-scarthgap, kept
# as a fallback until rpi3 is confirmed on blacksail.
#
# RPi3 B/B+ cannot run USB gadget (LAN9514 hub blocks DWC2 peripheral mode), so
# usb-gadget.inc is deliberately NOT required here. The A/B layout is MBR
# (BCM2837 boots MBR only — see raspberrypi3-64-wendyos.conf).

require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/common.inc
require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/rpi-blacksail.inc

# blacksail bring-up: bridge LAYERSERIES_COMPAT for layers that haven't declared
# blacksail upstream yet (meta-oe/meta-virt + meta-raspberrypi). Gated on
# WENDYOS_LAYER_TREE == "blacksail", inert elsewhere.
require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/blacksail-compat.inc

DEVICE  = "raspberry-pi-3"
STORAGE = "sd"
MACHINE = "raspberrypi3-64-wendyos"

