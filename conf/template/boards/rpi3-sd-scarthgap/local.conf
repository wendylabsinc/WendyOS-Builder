# rpi3-sd-scarthgap: LEGACY Raspberry Pi 3 B/B+ (SD) on the scarthgap tree.
# Fallback during the blacksail migration — the canonical board is now rpi3-sd
# (blacksail). DELETE this once rpi3 is confirmed on blacksail.
#
# wendyos-update A/B OTA on the frozen scarthgap tree (MBR layout — BCM2837 boots
# MBR only; see raspberrypi3-64-wendyos.conf). RPi3 B/B+ cannot run USB gadget
# (LAN9514 hub blocks DWC2 peripheral mode), so usb-gadget.inc is NOT required.

require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/common.inc
require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/rpi.inc

DEVICE  = "raspberry-pi-3"
STORAGE = "sd"
MACHINE = "raspberrypi3-64-wendyos"

