# jetson-orin-nano-sd: NVIDIA Jetson Orin Nano Developer Kit (SD card)

require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/common.inc
require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/usb-gadget.inc
require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/tegra-t234.inc

# blacksail bring-up: bridge meta-oe/meta-virt LAYERSERIES_COMPAT until
# upstream declares blacksail. Inert on non-blacksail trees.
require ${TOPDIR}/../${WENDYOS_META_REPO}/conf/template/include/local/blacksail-compat.inc

DEVICE  = "jetson-orin-nano"
STORAGE = "sd"
MACHINE = "jetson-orin-nano-devkit-wendyos"

# Flash image size - sets MENDER_STORAGE_TOTAL_SIZE_MB via flash-image-sizes.inc
# Supported: "4GB", "8GB", "16GB", "32GB", "64GB"
#
# Must match TEGRAFLASH_SDCARD_SIZE in the machine config: meta-tegra bakes
# that into dosdcard.sh at recipe time and the script accepts no runtime size
# override, so a mismatch makes sgdisk fail to lay out the partition table.
# 16 GB is too tight for a full WendyOS rootfs (~6.5 GiB image, ~6 GiB per
# A/B slot after Mender + reserved overhead), so we use 32 GB.
WENDYOS_FLASH_IMAGE_SIZE = "32GB"
