
# Make the layer visible to bitbake
BBPATH:prepend := "${LAYERDIR}:"

# Where to find recipes in this layer
BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
    "

# Register this layer
BBFILE_COLLECTIONS += "wendyos"
BBFILE_PATTERN_wendyos := "^${LAYERDIR}/"
BBFILE_PRIORITY_wendyos = "50"

# Active series: scarthgap (Orin/RPi/QEMU) and wrynose (Thor). Whinlatter
# was an interim during Thor bring-up but is non-LTS, EOL ~2026-05, and
# missing the c710879b4c kernel-initramfs cycle fix that wrynose has — no
# board pins it now. Drop it from the compat set if/when re-added, also
# add it to meta-tegra-extensions/conf/layer.conf.
LAYERSERIES_COMPAT_wendyos = "scarthgap wrynose blacksail"
LAYERVERSION_wendyos = "1"

# Dependencies on other layers (at minimum you depend on 'core')
LAYERDEPENDS_wendyos = "core"

# This is used by the tegra-distro-sanity bbclass
# to identify the distro layer directory during
# bblayers checks.
TD_DISTRO_LAYERDIR = "${LAYERDIR}"
