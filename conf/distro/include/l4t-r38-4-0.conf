#
# L4T R38.4.0 Version Pinning Configuration
# This file pins all NVIDIA L4T packages to release 38.4.0 (JetPack 7.1)
# for Thor (tegra264 / SOC_FAMILY = "tegra264").
#
# Versions below were transcribed from meta-tegra branch master-l4t-r38.4.x
# at SRCREV 1f28e68deca6773059da8635f0353aff23340790. Where a value
# could not be confirmed against an upstream recipe filename, it is left
# as a clearly-flagged TODO rather than guessed.

# L4T version string (format: major.minor.patch)
L4T_VERSION = "38.4.0"

# Corresponding BSP version used by meta-tegra
L4T_BSP_VERSION = "r38.4.0"

# CUDA version for L4T 38.4 (JetPack 7.1 ships CUDA 13.0)
# Source: meta-tegra master-l4t-r38.4.x conf/machine/include/tegra-common.inc
#         CUDA_VERSION ?= "13.0"
CUDA_VERSION = "13.0"
CUDA_VERSION_DASHED = "13-0"

# cuDNN version for this release
# Source: recipes-devtools/cudnn/cudnn_9.12.0.46-1.bb
CUDNN_VERSION = "9.12.0"

# TensorRT version for this release
# Source: recipes-devtools/gie/tensorrt-core_10.13.3.9-1.bb
TENSORRT_VERSION = "10.13.3"

# Pin specific L4T packages to r38.4.0
PREFERRED_VERSION_tegra-libraries = "38.4.0%"
PREFERRED_VERSION_tegra-libraries-multimedia = "38.4.0%"
PREFERRED_VERSION_tegra-libraries-cuda = "38.4.0%"
PREFERRED_VERSION_tegra-libraries-nvsci = "38.4.0%"

# CUDA toolkit pinning
PREFERRED_VERSION_cuda-toolkit = "13.0%"
PREFERRED_VERSION_cuda-cudart = "13.0%"
PREFERRED_VERSION_cuda-nvcc = "13.0%"

# cuDNN pinning
PREFERRED_VERSION_cudnn = "9.12%"

# TensorRT pinning
PREFERRED_VERSION_tensorrt-core = "10.13%"
# Source: master-l4t-r38.4.x conf/machine/include/tegra-common.inc
#         PREFERRED_PROVIDER_tensorrt-plugins ?= "tensorrt-plugins-prebuilt"
# Recipe: recipes-devtools/gie/tensorrt-plugins-prebuilt_10.13.3.9-1.bb
PREFERRED_VERSION_tensorrt-plugins-prebuilt = "10.13%"

# NVIDIA container runtime
# Source: external/virtualization-layer/recipes-containers/libnvidia-container/libnvidia-container_1.18.0.bb
# Source: external/virtualization-layer/recipes-containers/nvidia-container-toolkit/nvidia-container-toolkit_1.18.0.bb
PREFERRED_VERSION_libnvidia-container = "1.18%"
PREFERRED_VERSION_nvidia-container-toolkit = "1.18%"

# Optional: Force specific git SHAs if needed for reproducibility
# L4T_BSP_SHA256 = "your-sha-here"
# L4T_KERNEL_SHA256 = "your-sha-here"

# Prevent automatic updates
# This ensures builds are reproducible and don't fetch newer versions
TEGRA_SKIP_VERSION_CHECK = "1"
