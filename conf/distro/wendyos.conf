
# (Optionally) pull in a private secrets file if present
# include conf/distro/include/mender-secrets.inc

# Master switch for the Mender stack and everything that depends on the
# /data partition Mender provides (mender-esp, systemd-mount-containerd,
# swapfile-setup, wendyos-etc-binds, wendyos-user-data-setup, etc.).
# Default: enabled for real Jetson hardware (Orin tegra234), disabled for
# QEMU, RPi, and Thor (tegra264 — Mender deferred). Override per-machine
# or in local.conf to opt in/out independently of the SoC. RPi machine
# confs set WENDYOS_MENDER = "1" individually now that RPi3/4/5 OTA is
# hardware-verified.
WENDYOS_MENDER ?= "${@'0' if any(t in d.getVar('MACHINEOVERRIDES').split(':') for t in ('qemuall', 'rpi', 'tegra264')) else '1'}"

# Mender configuration (only used when WENDYOS_MENDER = "1")
PREFERRED_PROVIDER_mender = "mender"
PREFERRED_VERSION_mender = "5.0.%"
# PREFERRED_VERSION_mender = "5.%"
MENDER_SERVER_URL = "https://docker.mender.io"

# Resolve libnss-mdns runtime provider ambiguity. Wrynose oe-core split
# Avahi's NSS plugin into a standalone avahi-libnss-mdns recipe, which
# now competes with meta-networking's mdns (Apple's mDNSResponder) as
# an RPROVIDER of libnss-mdns. We use Avahi, so prefer it. Scarthgap's
# avahi includes the NSS plugin in the main recipe and avahi-libnss-mdns
# doesn't exist there; leave the preference unset so mdns (the sole
# provider) is picked.
PREFERRED_RPROVIDER_libnss-mdns = "${@'avahi-libnss-mdns' if 'scarthgap' not in d.getVar('LAYERSERIES_CORENAMES').split() else ''}"

require conf/distro/poky.conf
require systemd.conf

# Mender stack and the disk-layout helpers that depend on its /data
# partition. Gated on WENDYOS_MENDER (defined above). To re-enable
# Mender on Thor in Phase 4, override WENDYOS_MENDER = "1" in Thor's
# machine.conf or in the smart default expression above.
# flash-image-sizes.inc is additionally gated on 'tegra' — it sets
# TEGRA_EXTERNAL_DEVICE_SECTORS and a Mender storage total tuned to the
# Tegra partition overhead; RPi machines set MENDER_STORAGE_TOTAL_SIZE_MB
# directly in their machine conf.
require ${@'conf/distro/include/mender.inc'              if d.getVar('WENDYOS_MENDER') == '1' else ''}
require ${@'conf/distro/include/flash-image-sizes.inc'   if d.getVar('WENDYOS_MENDER') == '1' and 'tegra' in d.getVar('MACHINEOVERRIDES').split(':') else ''}

# Conditionally require L4T configuration only for Tegra machines.
# Thor (tegra264) pins L4T 38.4.0 (JetPack 7.1); Orin (tegra234) stays on
# L4T 36.4.4 (JetPack 6.2.1). Non-Tegra builds (qemuarm64, raspberrypi*)
# include neither.
require ${@'conf/distro/include/l4t-r38-4-0.conf' if 'tegra264' in d.getVar('MACHINEOVERRIDES').split(':') else ('conf/distro/include/l4t-r36-4-4.conf' if 'tegra' in d.getVar('MACHINEOVERRIDES').split(':') else '')}

# Network management with NetworkManager
DISTRO_FEATURES:append = " networkmanager"
VIRTUAL-RUNTIME_net_manager = "networkmanager"

# Optional: Use systemd-resolved for DNS (alternative to dnsmasq)
# DISTRO_FEATURES:append = " resolved"

# Note: MENDER_FEATURES_ENABLE is set in mender.inc (only included for Tegra/real hardware)
# QEMU doesn't use Mender, so this variable remains unset for QEMU builds

DISTRO = "wendyos"
DISTROOVERRIDES = "poky"

DISTRO_NAME = "WendyOS Linux platform"
DISTRO_VERSION = "0.15.1"
# DISTRO_CODENAME is inherited from poky.conf (require'd above), which
# sets it to the active oe-core series ("scarthgap", "wrynose", ...).
# Don't override here or it gets stuck on a stale value across series.

SDK_VENDOR = "-wendyossdk"
SDK_VERSION = "${@d.getVar('DISTRO_VERSION')}"
SDK_NAME = "${DISTRO}-${TCLIBC}-${SDKMACHINE}-${IMAGE_BASENAME}-${TUNE_PKGARCH}-${MACHINE}"
SDKPATHINSTALL = "/opt/${DISTRO}/${SDK_VERSION}"

# MAINTAINER = "name <email>"

# remove distro unnecessary feature(s)
DISTRO_FEATURES:remove = " \
    x11 \
    wayland \
    sysvinit \
    ptest \
    3g \
    "

# Add OpenGL support for TensorRT
DISTRO_FEATURES:append = " opengl"

# Accept commercial LICENSE_FLAGS for gstreamer1.0-plugins-ugly (x264enc/x264)
LICENSE_FLAGS_ACCEPTED += "commercial"

# Add virtualization support for NVIDIA Container Toolkit
DISTRO_FEATURES:append = " virtualization"

# Add polkit for rtkit support (real-time audio priority)
DISTRO_FEATURES:append = " polkit"

# WendyOS Configuration Variables
# These can be overridden in local.conf or on the command line
WENDYOS_UPDATE_BOOTLOADER ?= "1"

# Container runtime (containerd + nerdctl + CNI). All in-tree machines need it;
# set to "0" in a machine conf to opt out.
WENDYOS_CONTAINER_RUNTIME ?= "1"

# USB gadget network mode for the usb0 interface
# "link-local"  - RFC 3927 self-assigned 169.254.x.x (discovery via mDNS/Avahi)
# "dhcp-client" - Device is DHCP client (host must run DHCP server)
# "dhcp-server" - Device runs DHCP server via NM shared mode (requires dnsmasq)
WENDYOS_USB_NET_MODE ?= "link-local"

# Interfaces on which Avahi publishes mDNS services
# Default: usb0 only (device discoverable only by the directly-connected host)
# Set to "" to allow all interfaces (discoverable on LAN)
WENDYOS_MDNS_INTERFACES ?= ""

# Enable UEFI/EFI debug build for verbose boot/capsule debug output
# Set to "1" to enable DEBUG mode (verbose UART output)
# Set to "0" for RELEASE mode (minimal output, production default)
WENDYOS_EFI_DEBUG ?= "0"

# Enable persistent journal logs on /data partition.
# Default tracks WENDYOS_MENDER: when Mender provides /data we persist
# logs there; when there's no /data partition (QEMU, Thor Phase 1, RPi
# machines that haven't opted in) logs are volatile. Override per-machine
# or in local.conf to decouple.
WENDYOS_PERSIST_JOURNAL_LOGS ?= "${WENDYOS_MENDER}"

# Config partition (FAT32, mountable on Linux/macOS/Windows)
# Used by Jetson XML layouts and RPi5 WKS files
WENDYOS_CONFIG_PART_SIZE_MB ?= "256"
WENDYOS_CONFIG_PART_NUMBER ?= "16"

# Include hardware-specific distro configuration
require ${@'conf/distro/include/qemu-distro.inc' if 'qemuall' in d.getVar('MACHINEOVERRIDES').split(':') else ''}
require ${@'conf/distro/include/rpi-distro.inc'  if 'rpi'     in d.getVar('MACHINEOVERRIDES').split(':') else ''}

# /var/log placement: persistent storage vs tmpfs. The mechanism diverges
# by oe-core series — scarthgap uses legacy VOLATILE_LOG_DIR; whinlatter+
# replaced it with FILESYSTEM_PERMS_TABLES selection. Setting the wrong
# variable for the active series either errors (whinlatter rejects
# VOLATILE_LOG_DIR via BB_RENAMED_VARIABLES) or warns and drops perms
# entries (scarthgap doesn't ship files/fs-perms-volatile-*.txt). Gate
# via LAYERSERIES_CORENAMES.
require ${@'conf/distro/include/journal-logs-scarthgap.inc' if 'scarthgap' in d.getVar('LAYERSERIES_CORENAMES').split() else 'conf/distro/include/journal-logs-modern.inc'}

# UNPACKDIR did not exist before styhead. Our recipes reference it so the
# same source tree works on whinlatter (where ${UNPACKDIR} = ${WORKDIR}/sources)
# and on scarthgap (where this shim aliases it to ${WORKDIR}, matching the
# legacy fetcher's unpack location).
require ${@'conf/distro/include/unpackdir-scarthgap.inc' if 'scarthgap' in d.getVar('LAYERSERIES_CORENAMES').split() else ''}

PACKAGE_CLASSES ?= "package_rpm"
# PACKAGE_CLASSES = "package_ipk"

# Runtime package management policy.
# "0" = no package manager binaries in the rootfs (default; image is updated
#       atomically via Mender A/B).
# "1" = include rpm/dnf for runtime package operations on the device.
WENDYOS_ENABLE_PACKAGE_MANAGEMENT ?= "0"

# When disabled, suppress the OE-core backfill that would otherwise add
# 'package-management' to IMAGE_FEATURES (see IMAGE_FEATURES_BACKFILL in
# poky's conf/bitbake.conf).
IMAGE_FEATURES_BACKFILL_CONSIDERED += "${@bb.utils.contains('WENDYOS_ENABLE_PACKAGE_MANAGEMENT', '1', '', 'package-management', d)}"

SANITY_TESTED_DISTROS ?= " \
    ubuntu-20.04 \n\
    ubuntu-22.04 \n\
    ubuntu-24.04 \n\
    "

# require conf/distro/include/poky-world-exclude.inc
# require conf/distro/include/no-static-libs.inc
# require conf/distro/include/yocto-uninative.inc
# require conf/distro/include/security_flags.inc

USE_REDUNDANT_FLASH_LAYOUT_DEFAULT ?= "1"

# INHERIT += "tegra-support-sanity"
# ESDK_CLASS_INHERIT_DISABLE:append = " tegra-support-sanity"

BB_SIGNATURE_HANDLER ?= "OEEquivHash"
BB_HASHSERVE ??= "auto"

# Enable creation of SPDX manifests by default
INHERIT += "create-spdx"

INHERIT += " \
    uninative \
    "

# Note: mender-setup is conditionally inherited via mender-maybe-setup class
# (from meta-mender layer.conf) based on MENDER_FEATURES_ENABLE being set.
# WENDYOS_MENDER (defined above) gates the require of mender.inc, which in
# turn sets MENDER_FEATURES_ENABLE via mender-full. So:
#   WENDYOS_MENDER=1 (default for Orin tegra234, opt-in per RPi machine)  -> mender.inc loaded -> Mender on
#   WENDYOS_MENDER=0 (QEMU, Thor tegra264, RPi default)                    -> mender.inc skipped -> Mender off
