
# enable systemd (instead of sysvinit)
# (use systemd as PID 1)
DISTRO_FEATURES:append = " systemd usrmerge"
DISTRO_FEATURES:remove = " sysvinit"

# Prevent the old sysvinit feature from being backfilled. The variable
# was renamed in wrynose (DISTRO_FEATURES_BACKFILL_CONSIDERED →
# DISTRO_FEATURES_OPTED_OUT); gate on LAYERSERIES_CORENAMES.
require ${@'conf/distro/include/systemd-features-scarthgap.inc' if 'scarthgap' in d.getVar('LAYERSERIES_CORENAMES').split() else 'conf/distro/include/systemd-features-modern.inc'}

VIRTUAL-RUNTIME_init_manager = "systemd"
INIT_MANAGER = "systemd"

# provide compatibility for packages that still ship SysV scripts
# (optional)
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
# VIRTUAL-RUNTIME_syslog = ""
# VIRTUAL-RUNTIME_base-utils-syslog = ""

# using '/home/root' as root user's home directory is not fully supported by
# systemd as the code hardcodes '/root'
ROOT_HOME = "/root"
